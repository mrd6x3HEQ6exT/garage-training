<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Rack & Roll — Garage Training</title>
<meta name="theme-color" content="#0E1013">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rack & Roll">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0E1013; --panel:#181B20; --panel2:#20242B; --line:#2C313A; --line2:#3A414C;
  --ink:#EDEFF2; --muted:#AEB6C2; --faint:#828A96;
  --amber:#F2C14E; --amber-d:#C99A2E; --steel:#7C97B4;
  --ready:#6FBF73; --mid:#E0A93B; --cold:#C8554C;
  /* plate colors per user spec */
  --p45:#2F6FB0; --p25:#3A9D5A; --p10:#8B929C; --p5:#2F6FB0; --p25s:#3A9D5A;
  --radius:5px; --tap:46px;
  --disp:'Oswald',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);-webkit-text-size-adjust:100%}
body{padding-bottom:84px;line-height:1.45;font-size:15px}
button{font-family:inherit;color:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
h1,h2,h3{font-family:var(--disp);font-weight:600;letter-spacing:.02em;margin:0}
.mono{font-family:var(--mono)}
.app{max-width:680px;margin:0 auto;padding:0 14px}

header{position:sticky;top:0;z-index:40;background:linear-gradient(180deg,#15181D,#101216);border-bottom:1px solid var(--line)}
header::after{content:"";display:block;height:4px;background:repeating-linear-gradient(135deg,var(--amber-d) 0 3px,transparent 3px 7px);opacity:.55}
.hbar{max-width:680px;margin:0 auto;padding:11px 14px;display:flex;align-items:center;gap:11px}
.logo{font-family:var(--disp);font-weight:700;font-size:21px;letter-spacing:.06em;text-transform:uppercase;line-height:1}
.logo b{color:var(--amber)}
.logo small{display:block;font-family:var(--mono);font-weight:400;font-size:9.5px;letter-spacing:.34em;color:var(--faint);margin-top:3px}
.week{margin-left:auto;text-align:right;font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.3}
.week b{color:var(--ink);font-size:15px}

nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:#101216;border-top:1px solid var(--line);display:flex;justify-content:center;padding-bottom:env(safe-area-inset-bottom)}
nav .inner{display:flex;max-width:680px;width:100%}
nav button{flex:1;background:none;border:0;padding:9px 4px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint);font-family:var(--disp);font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;border-top:2px solid transparent;margin-top:-1px}
nav button svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7}
nav button.on{color:var(--amber);border-top-color:var(--amber)}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin:12px 0}
.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint)}
.row{display:flex;gap:8px;align-items:center}
.spread{display:flex;justify-content:space-between;align-items:center;gap:10px}
.muted{color:var(--muted)}
.btn{background:var(--panel2);border:1px solid var(--line2);border-radius:var(--radius);padding:0 14px;min-height:var(--tap);font-family:var(--disp);font-size:14px;letter-spacing:.04em;text-transform:uppercase;display:inline-flex;align-items:center;justify-content:center;gap:7px}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--amber);color:#1a1400;border-color:var(--amber);font-weight:600}
.btn.ghost{background:transparent}
.btn.sm{min-height:36px;font-size:12px;padding:0 10px}
.btn.block{width:100%}
.seg{display:flex;border:1px solid var(--line2);border-radius:var(--radius);overflow:hidden;flex-wrap:wrap}
.seg button{flex:1 1 auto;background:var(--panel);border:0;border-right:1px solid var(--line);min-height:var(--tap);font-family:var(--disp);font-size:13.5px;letter-spacing:.03em;color:var(--muted);text-transform:uppercase;padding:0 6px;white-space:nowrap}
.seg button:last-child{border-right:0}
.seg button.on{background:var(--amber);color:#1a1400;font-weight:600}

/* readiness stack */
.stack-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(54px,1fr));gap:8px;margin-top:11px}
.mstack{display:flex;flex-direction:column;align-items:center;gap:6px}
.plates{width:100%;height:70px;display:flex;flex-direction:column-reverse;gap:2px}
.pl{height:6px;border-radius:1.5px;background:var(--line)}
.pl.lit{background:var(--seg-c,var(--ready))}
.mlabel{font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;text-align:center;line-height:1.1}
.mval{font-family:var(--mono);font-size:10px;color:var(--faint)}

.wo-head{display:flex;align-items:flex-end;justify-content:space-between;gap:10px}
.wo-title{font-family:var(--disp);font-size:27px;font-weight:700;line-height:1;text-transform:uppercase;letter-spacing:.01em}
.tag{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--line2);border-radius:3px;padding:3px 7px;color:var(--muted)}
.tag.amber{border-color:var(--amber-d);color:var(--amber)}
.tag.steel{border-color:#3d5168;color:var(--steel)}
.group{border:1px solid var(--line);border-radius:var(--radius);margin:11px 0;overflow:hidden}
.group.superset{border:2px solid var(--ready);box-shadow:0 0 0 1px rgba(111,191,115,.12),0 2px 14px rgba(111,191,115,.12)}
.group.circuit{border:2px solid var(--amber-d);box-shadow:0 0 0 1px rgba(201,154,46,.12),0 2px 14px rgba(242,193,78,.1)}
.setrow.cuenext{background:rgba(242,193,78,.16);border-radius:7px;box-shadow:0 0 0 2px var(--amber);transition:background .3s}
.group-h{background:var(--panel2);padding:7px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line)}
.group-h .gk{font-family:var(--disp);font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber)}
.group-h .gk.superset{background:var(--ready);color:#0d1a0e;padding:4px 11px;border-radius:6px;font-size:15px;letter-spacing:.14em;box-shadow:0 0 0 1px var(--ready),0 2px 8px rgba(111,191,115,.28)}
.group-h .gk.circuit{background:var(--amber);color:#160f00;padding:4px 11px;border-radius:6px;font-size:15px;letter-spacing:.14em;box-shadow:0 0 0 1px var(--amber),0 2px 8px rgba(245,176,66,.26)}
.group-h .gr{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--faint)}
.ex{padding:12px;border-bottom:1px solid var(--line)}
.ex:last-child{border-bottom:0}
.ex-top{display:flex;align-items:baseline;gap:9px}
.ex-name{font-family:var(--disp);font-size:17px;font-weight:600;letter-spacing:.01em}
.ex-scheme{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--amber);white-space:nowrap}
.ex-cue{font-size:12.5px;color:var(--muted);margin-top:3px}
.ex-tech{font-size:12px;color:var(--steel);margin-top:5px;font-style:italic}
.ctrls{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.chip{background:var(--panel2);border:1px solid var(--line2);border-radius:4px;min-height:34px;padding:0 9px;font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:#CBD2DC;display:inline-flex;align-items:center;gap:5px;text-transform:uppercase}
.chip svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}
.chip.on{background:var(--amber);border-color:var(--amber);color:#160f00;font-weight:600}
.chip.on svg{stroke:#160f00}
.chip.on2{border-color:#E06A5C;color:#E06A5C}
.chip.on2 svg{fill:#E06A5C;stroke:#E06A5C}
.mmap{margin:10px 0 2px;border:1px solid var(--line2);border-radius:8px;padding:11px 12px;background:var(--panel2)}
.mmap-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.mrow{display:grid;grid-template-columns:58px 1fr 46px;align-items:center;gap:9px;margin:5px 0}
.mm-name{font-size:12px;color:var(--ink)}
.mm-bar{height:8px;background:var(--bg);border-radius:5px;overflow:hidden}
.mm-bar i{display:block;height:100%;border-radius:5px}
.mm-bar i.fresh{background:var(--ready)} .mm-bar i.mid{background:var(--mid)} .mm-bar i.tired{background:var(--cold)}
.mm-ago{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;text-align:right}
.mm-ago.fresh{color:var(--ready)} .mm-ago.mid{color:var(--mid)} .mm-ago.tired{color:var(--cold)}
.chip.rest{color:var(--steel);border-color:#34465a}
.chip.pin.on svg{fill:#160f00}
a.chip{text-decoration:none}
.chip.yt{color:#E06A5C;border-color:#5A3A36}
.chip.yt svg{stroke-width:1.6}

.sets{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.setrow{display:grid;grid-template-columns:24px 1fr 1fr 40px;gap:7px;align-items:center}
.setrow .si{font-family:var(--mono);font-size:12px;color:var(--faint);text-align:center}
.setrow .hdr{font-family:var(--mono);font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:#C3CAD5;text-align:center;padding-bottom:5px;border-bottom:1px solid var(--line2)}
.fld{position:relative}
.fld input{width:100%;min-height:40px;background:var(--bg);border:1px solid var(--line2);border-radius:var(--radius);color:var(--ink);font-family:var(--mono);font-size:15px;text-align:center;padding:0 4px}
.fld input:focus{outline:none;border-color:var(--amber)}
.fld .u{position:absolute;right:7px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:9.5px;color:var(--faint);pointer-events:none}
.chk{width:40px;height:40px;border:1px solid var(--line2);border-radius:var(--radius);background:var(--bg);display:flex;align-items:center;justify-content:center}
.chk svg{width:20px;height:20px;stroke:var(--faint);fill:none;stroke-width:2.4;opacity:.4}
.chk.done{background:var(--ready);border-color:var(--ready)}
.chk.done svg{stroke:#0c1a0d;opacity:1}
.addset{font-family:var(--mono);font-size:11px;color:var(--steel);background:none;border:0;padding:4px 0;text-align:left}
.droprow .si{color:var(--cold);font-weight:700}
.droprow input{border-color:#5a3a36}

/* RPE */
.rpe{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.rpe .lab{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
.rpe button{min-width:36px;min-height:32px;background:var(--bg);border:1px solid var(--line2);border-radius:4px;font-family:var(--mono);font-size:12px;color:var(--muted)}
.rpe button.on{background:var(--steel);border-color:var(--steel);color:#06121d;font-weight:700}
.rpe .hint{font-size:10.5px;color:var(--faint);flex-basis:100%;margin-top:1px}

/* swap panel */
.swap{margin-top:10px;border:1px dashed var(--line2);border-radius:var(--radius);padding:10px;background:#13161a}
.swap .ban{width:100%;justify-content:flex-start;color:var(--cold);border-color:#5a3330;margin-bottom:8px}
.swap .alt{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--line)}
.swap .alt:last-child{border-bottom:0}
.swap .alt .an{flex:1;font-size:14px}
.swap .alt .an small{display:block;color:var(--faint);font-family:var(--mono);font-size:10px;margin-top:1px}

/* plate calculator */
.pcalc{margin-top:10px;border:1px solid var(--line2);border-radius:var(--radius);padding:11px;background:#0c0f13}
.pc-in{display:flex;gap:8px;align-items:center;margin-bottom:11px;flex-wrap:wrap}
.pc-in label{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
.pc-in input{width:84px;min-height:38px;background:var(--bg);border:1px solid var(--line2);border-radius:var(--radius);color:var(--ink);font-family:var(--mono);font-size:16px;text-align:center}
.pc-in select{min-height:38px;background:var(--bg);border:1px solid var(--line2);border-radius:var(--radius);color:var(--ink);font-family:var(--mono);font-size:13px;padding:0 6px}
.pc-rack{display:flex;align-items:center;min-height:128px;padding:6px 0;overflow-x:auto}
.pc-barstub{flex:none;width:30px;height:13px;background:linear-gradient(180deg,#c9ced6,#7c828c);border-radius:2px;box-shadow:inset 0 0 0 1px #555}
.pc-collar{flex:none;width:10px;height:22px;background:#9aa0aa;border-radius:2px;margin:0 1px}
.pc-plate{flex:none;border-radius:3px;margin-right:3px;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.18),inset 0 0 0 6px rgba(0,0,0,.12);position:relative}
.pc-plate i{font-family:var(--mono);font-style:normal;font-size:9px;font-weight:700;color:rgba(255,255,255,.92);writing-mode:vertical-rl;text-orientation:mixed;letter-spacing:.5px}
.pc-cap{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:9px;line-height:1.5}
.pc-cap b{color:var(--ink)}
.pc-cap .warn{color:var(--mid)}
.pc-side-note{font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em}

.cond{padding:12px;background:linear-gradient(180deg,#1b1d22,#16181c)}
.cond .ex-name{color:var(--ink)}
.cond .proto{font-family:var(--mono);font-size:13.5px;color:var(--amber);margin-top:6px;line-height:1.5}

.eq-cat{font-family:var(--disp);font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin:16px 0 7px}
.eq{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
.eq:last-child{border-bottom:0}
.eq .nm{flex:1}
.eq .nm small{display:block;color:var(--faint);font-family:var(--mono);font-size:10.5px;margin-top:2px}
.sw{width:46px;height:27px;border-radius:14px;background:var(--line);border:1px solid var(--line2);position:relative;flex:none;transition:background .15s}
.sw::after{content:"";position:absolute;top:2px;left:2px;width:21px;height:21px;border-radius:50%;background:#cdd3db;transition:left .15s}
.sw.on{background:var(--amber-d)}
.sw.on::after{left:21px;background:#fff}
.eq.off .nm{opacity:.4}
.addgear{display:grid;grid-template-columns:1fr;gap:8px}

.logitem{padding:13px 0;border-bottom:1px solid var(--line)}
.logitem:last-child{border-bottom:0}
.logitem .dt{font-family:var(--mono);font-size:11px;color:var(--faint)}
.logitem .ti{font-family:var(--disp);font-size:18px;font-weight:600;text-transform:uppercase}
.logitem .meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px}
.exp{margin-top:9px;font-size:13px;color:var(--muted);display:none}
.exp.open{display:block}
.exp .er{display:flex;justify-content:space-between;gap:10px;padding:3px 0;border-bottom:1px dashed var(--line)}
.exp .er .mono{color:var(--ink);text-align:right}

.frow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
.frow:last-child{border-bottom:0}
.frow label{flex:1;font-size:14px}
.frow label small{display:block;color:var(--faint);font-size:11.5px;margin-top:2px}
select.in,input.in,textarea.in{min-height:42px;background:var(--bg);border:1px solid var(--line2);border-radius:var(--radius);color:var(--ink);padding:0 10px;font-size:14px}
select.in{min-width:108px}
.manage{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--line)}
.bandguide{display:flex;flex-direction:column;gap:2px}
.brow{display:flex;align-items:center;gap:10px;padding:4px 0}
.brow .mn{font-size:13px;color:var(--ink);flex:1}
.brow .mono{font-size:11px;color:var(--muted)}
.bswatch{width:22px;height:14px;border-radius:4px;flex:none}
.pc-tabs{display:flex;align-items:center;gap:6px;margin-bottom:9px;flex-wrap:wrap}
.pc-tab{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:5px 10px;border:1px solid var(--line2);border-radius:6px;background:var(--bg);color:var(--muted)}
.pc-tab.on{background:var(--amber);border-color:var(--amber);color:#160f00;font-weight:600}
.pc-side{width:auto;margin-left:auto;font-size:12px;padding:5px 8px}
.pc-plates{display:flex;flex-wrap:wrap;gap:7px;margin:4px 0 10px}
.pc-add{font-family:var(--mono);font-size:14px;font-weight:600;padding:8px 12px;border:1px solid var(--amber-d);border-radius:7px;background:var(--panel2);color:var(--amber);min-width:48px}
.pc-add:active{transform:scale(.95)}
.pc-add.clear{border-color:var(--line2);color:var(--cold)}
.chip.danger{border-color:#5a3a36;color:var(--cold)}
.chip.ytl{border-color:#3a2a2a;color:#e06a5c;text-decoration:none}
.bandpick{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:8px 0 2px;padding:8px 10px;border:1px solid var(--line2);border-radius:8px;background:var(--panel2)}
.bp-lab{font-size:12px;color:var(--muted)}
.bp-dots{display:flex;gap:7px;margin-left:auto;flex-wrap:wrap}
.bp-dot{width:24px;height:24px;border-radius:50%;border:2px solid transparent;box-shadow:0 0 0 1px var(--line2)}
.bp-dot.on{border-color:var(--ink);box-shadow:0 0 0 2px var(--amber)}
.bp-dot:active{transform:scale(.9)}
.ctrls-more{display:flex;align-items:center;gap:8px;margin-top:8px;padding-top:9px;border-top:1px dashed var(--line2)}
.ctrls-more .more-lab{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
.tpl-list{display:flex;flex-direction:column;gap:8px}
.tpl{display:flex;align-items:stretch;gap:8px}
.tpl-load{flex:1;text-align:left;background:var(--panel2);border:1px solid var(--line2);border-radius:8px;padding:10px 12px;display:flex;flex-direction:column;gap:2px}
.tpl-load b{color:var(--ink);font-size:14px}
.tpl-load small{color:var(--muted);font-family:var(--mono);font-size:11px}
.chip.sm{min-height:0;padding:0 10px;align-self:stretch}
#updateBar{position:fixed;left:12px;right:12px;bottom:88px;z-index:60;background:var(--amber);color:#160f00;border-radius:10px;padding:11px 14px;display:none;align-items:center;gap:10px;font-size:13px;font-weight:600;box-shadow:0 6px 20px rgba(0,0,0,.4)}
#updateBar button{margin-left:auto;background:#160f00;color:var(--amber);border:0;border-radius:6px;padding:7px 12px;font-weight:700}
.manage:last-child{border-bottom:0}
.manage .mn{flex:1;font-size:14px}

.empty{text-align:center;padding:34px 16px;color:var(--muted)}
.empty .big{font-family:var(--disp);font-size:19px;text-transform:uppercase;letter-spacing:.05em;color:var(--ink);margin-bottom:6px}
.hint{font-size:12px;color:var(--faint)}
.toast{position:fixed;left:50%;bottom:96px;transform:translateX(-50%);background:var(--amber);color:#1a1400;font-family:var(--disp);font-size:14px;letter-spacing:.04em;text-transform:uppercase;padding:10px 18px;border-radius:var(--radius);z-index:80;box-shadow:0 6px 20px rgba(0,0,0,.5);opacity:0;pointer-events:none;transition:opacity .2s,transform .2s}
.toast.show{opacity:1;transform:translateX(-50%) translateY(-4px)}
.modal{position:fixed;inset:0;z-index:90;background:rgba(0,0,0,.66);display:none;align-items:center;justify-content:center;padding:18px}
.modal.show{display:flex}
.mcard{background:var(--panel);border:1px solid var(--line2);border-radius:var(--radius);padding:18px;max-width:430px;width:100%}
.mh{font-family:var(--disp);font-size:19px;text-transform:uppercase;letter-spacing:.03em;margin-bottom:6px}
.murl{margin-top:11px;background:var(--bg);border:1px solid var(--line2);border-radius:var(--radius);padding:9px;font-family:var(--mono);font-size:11px;color:var(--muted);word-break:break-all;user-select:all;-webkit-user-select:all}
.guide{font-size:14.5px;line-height:1.6;color:var(--ink)}

/* rest timer floating bar */
.rtimer{position:fixed;left:50%;transform:translateX(-50%);bottom:90px;z-index:70;background:#15181d;border:1px solid var(--line2);border-radius:30px;padding:7px 8px 7px 16px;display:none;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,.55);width:min(420px,calc(100% - 28px))}
.rtimer.show{display:flex}
.rtimer.done{border-color:var(--ready);animation:flash .5s 3}
@keyframes flash{50%{background:#1d2a1e}}
.rtimer .tlab{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint)}
.rtimer .tval{font-family:var(--mono);font-size:24px;font-weight:700;color:var(--ink);min-width:74px}
.rtimer .tval.done{color:var(--ready)}
.rtimer .tbtns{margin-left:auto;display:flex;gap:6px}
.rtimer .tb{min-width:42px;min-height:38px;background:var(--panel2);border:1px solid var(--line2);border-radius:8px;font-family:var(--mono);font-size:13px;color:var(--ink)}
.rtimer .tb.skip{background:var(--amber);color:#1a1400;border-color:var(--amber);font-family:var(--disp);text-transform:uppercase;font-size:12px;padding:0 12px}
.divider{height:1px;background:var(--line);margin:14px 0}

#printArea{display:none}
@media print{
  body{background:#fff;color:#000;padding:0}
  header,nav,.toast,.rtimer,.noprint{display:none!important}
  .app{display:none!important}
  #printArea{display:block;padding:0 4px;color:#000;font-family:Georgia,serif}

  .p-h h1{font-family:'Oswald',sans-serif;font-size:30px;text-transform:uppercase;margin:0}
  .p-h .pm{font-family:monospace;font-size:12px;text-align:right}
  .p-g{margin-top:14px;break-inside:avoid}

  table{width:100%;border-collapse:collapse;margin-bottom:6px}
  th,td{border:1px solid #000;padding:5px 6px;font-size:12px;text-align:left}

/* ---------------- Storage ----------------
   Layered for reliability: device-local (synchronous, survives the webview reload

   Every layer is guarded so a locked-down sandbox can't break the app. */
const MEM={};
const hasStore=typeof window!=="undefined"&&window.storage&&typeof window.storage.get==="function";
const LS=(()=>{ try{ const k="__rr_probe"; window.localStorage.setItem(k,"1"); window.localStorage.removeItem(k); return window.localStorage; }catch(e){ return null; } })();

function lsGet(k){ if(!LS) return null; try{ const v=LS.getItem(k); return v!=null?JSON.parse(v):null; }catch(e){ return null; } }
function lsSet(k,v){ if(!LS) return; try{ LS.setItem(k,JSON.stringify(v)); }catch(e){} }
async function loadKey(k){
  const local=lsGet(k); if(local!=null) return local;          // device-local first — reliable across reloads
  if(hasStore){ try{ const r=await window.storage.get(k); if(r&&r.value!=null){ const val=JSON.parse(r.value); lsSet(k,val); return val; } }catch(e){} } // backfill from account storage
  return (k in MEM)?MEM[k]:null;
}
async function saveKey(k,v){ MEM[k]=v; lsSet(k,v); if(hasStore){ try{ await window.storage.set(k,JSON.stringify(v)); }catch(e){} } }

/* recovery readiness with RPE weighting */
function readiness(){
  const now=Date.now(); const last={}, lastRpe={};
  for(const w of STATE.workouts){ // newest first
    for(const ex of w.exercises){
      if(!(ex.sets&&ex.sets.some(s=>s.done))) continue;
      for(const m of (ex.muscles||[])){
        if(last[m]==null){ last[m]=w.date; if(ex.rpe) lastRpe[m]=ex.rpe; }
        else if(w.date===last[m]){ if(ex.rpe&&(!lastRpe[m]||ex.rpe>lastRpe[m])) lastRpe[m]=ex.rpe; }
      }
    }
  }
  const out={};
  for(const m of MUSCLE_ORDER){
    if(last[m]==null){ out[m]=1; continue; }
    const r=lastRpe[m]; const mult=r>=9?1.25:r>=8?1.1:(r&&r<=6)?0.85:1;
    const days=(now-last[m])/86400000;
    out[m]=Math.max(0,Math.min(1, days/((RECOVERY_DAYS[m]||2)*mult)));
  }
  return out;
}
function lastFocus(){ return STATE.workouts.length?STATE.workouts[0].focus:null; }
function recommendFocus(){
  const r=readiness(), lf=lastFocus(); let best=null,bestScore=-1;
  for(const key of Object.keys(FOCI)){
    if(key==="core"||FOCI[key].cardio) continue; // core + cardio/hiit are opt-in, not auto-recommended
    const f=FOCI[key];
    const avg=f.muscles.reduce((a,m)=>a+(r[m]!=null?r[m]:1),0)/f.muscles.length;
    const score=avg-(key===lf?0.6:0);
    if(score>bestScore){ bestScore=score; best=key; }
  }
  return best;
}
function recentExerciseIds(n){ const s=new Set(); STATE.workouts.slice(0,n).forEach(w=>w.exercises.forEach(e=>s.add(e.id))); return s; }
function lastSession(exId){ for(const w of STATE.workouts){ const e=w.exercises.find(x=>x.id===exId); if(e&&e.sets&&e.sets.length) return e; } return null; }
function muscleLastTrained(){ const last={}; for(const w of STATE.workouts){ for(const ex of (w.exercises||[])){ if(!(ex.sets&&ex.sets.some(s=>s.done))) continue; for(const m of (ex.muscles||[])){ if(last[m]==null) last[m]=w.date; } } } return last; }
function workoutMuscleLoad(w){ const load={}; const add=(m,v)=>{ if(MUSCLE_LABEL[m]) load[m]=(load[m]||0)+v; };
  (w.exercises||[]).forEach(e=>{ const b=exById(e.id)||e; (b.primary||[]).forEach(m=>add(m,1)); (b.secondary||[]).forEach(m=>add(m,0.5)); });

  return load; }
function renderMuscleMap(w){
  const load=workoutMuscleLoad(w); const r=readiness(), last=muscleLastTrained(), now=Date.now();
  const rows=Object.keys(load).sort((a,b)=>load[b]-load[a]); if(!rows.length) return "";
  const maxL=Math.max(...rows.map(m=>load[m]));
  const tired=rows.filter(m=>(r[m]!=null?r[m]:1)<0.5);
  let h=`<div class="mmap"><div class="mmap-h"><span class="eyebrow">Muscles worked today</span><span class="hint">tag = last trained</span></div>`;
  rows.forEach(m=>{ const rr=r[m]!=null?r[m]:1; const cls=rr>=.75?"fresh":rr>=.4?"mid":"tired";
    const days=last[m]!=null?Math.floor((now-last[m])/86400000):null; const ago=days==null?"fresh":days<=0?"today":days===1?"1d":days+"d";
    const pct=Math.max(14,Math.round((load[m]/maxL)*100));
    h+=`<div class="mrow"><span class="mm-name">${esc(MUSCLE_LABEL[m])}</span><span class="mm-bar"><i class="${cls}" style="width:${pct}%"></i></span><span class="mm-ago ${cls}">${ago}</span></div>`; });

/* ---------------- Generation ---------------- */
function recFlag(id){ return (STATE.settings.recWeights||{})[id]||0; }
function recW(id){ const w=recFlag(id); return w===1?3:w===-1?0.34:1; }
function pickFrom(arr,recent){ if(!arr.length) return null; const fresh=arr.filter(e=>!recent.has(e.id)); const pool=fresh.length?fresh:arr;
  let tot=0; const wts=pool.map(e=>{ const w=recW(e.id); tot+=w; return w; }); if(tot<=0) return pool[Math.floor(Math.random()*pool.length)];
  let r=Math.random()*tot; for(let i=0;i<pool.length;i++){ r-=wts[i]; if(r<=0) return pool[i]; } return pool[pool.length-1]; }
function generate(focusKey,duration,mode){
  const f=FOCI[focusKey], owned=ownedCaps();
  const blocked=new Set(STATE.settings.blocked||[]);

  if(f.custom){ return {id:"w"+Date.now(),date:Date.now(),focus:focusKey,focusName:f.name,duration,mode,exercises:[],conditioning:[],groups:[],note:"",custom:true}; }
  if(f.cardio){
    const want=f.style;
    let condPool=EXERCISES.filter(e=>e.type==="conditioning"&&exAvailable(e,owned)&&!blocked.has(e.id)&&COND_STYLE[e.id]===want);
    const n=(want==="interval"?{30:3,45:4,60:5}:{30:1,45:2,60:2})[duration];
    const conds=[]; const cp=[...condPool];
    for(let i=0;i<n&&cp.length;i++) conds.push(cp.splice(Math.floor(Math.random()*cp.length),1)[0]);
    if(conds.length<n){ const extra=EXERCISES.filter(e=>e.type==="conditioning"&&exAvailable(e,owned)&&!blocked.has(e.id)&&!conds.includes(e)); while(conds.length<n&&extra.length) conds.push(extra.splice(Math.floor(Math.random()*extra.length),1)[0]); }
    return {id:"w"+Date.now(),date:Date.now(),focus:focusKey,focusName:f.name,duration,mode:want==="interval"?"circuit":"strength",cardio:true,
      exercises:[],conditioning:conds.map(c=>buildCond(c,duration)),groups:[],note:""};
  }

  const isCore=focusKey==="core";

  if(!isCore){ for(const pat of f.anchors){ if(chosen.length>=Math.min(2,sCount)) break; add(pickFrom(pool.filter(e=>e.pattern===pat&&e.role==="compound"&&!chosen.includes(e)),recent)); } }

  guard=0; while(chosen.length<sCount&&guard++<60){ const cands=isCore?pool.filter(e=>!chosen.includes(e)&&(e.primary.includes("core")||e.secondary.includes("core"))):pool.filter(e=>!chosen.includes(e)); const e=pickFrom(cands,recent); if(!e) break; add(e); }

  const condPool=EXERCISES.filter(e=>e.type==="conditioning"&&exAvailable(e,owned)&&!blocked.has(e.id));
  const conds=[]; // strength/lift sessions add no cardio automatically — add it yourself, or run a Cardio/HIIT session

  }
  let gmode=mode; const g=goalDef();

  let groups=groupExercises(chosen,gmode);

  const wo={id:"w"+Date.now(),date:Date.now(),focus:focusKey,focusName:f.name,duration,mode,
    exercises:chosen.map(buildLoggable),conditioning:conds.map(c=>buildCond(c,duration)),groups,note:""};

function normalizeGroupSets(w){
  (w.groups||[]).forEach(g=>{ if(g.items.length<2) return;
    const exs=g.items.map(id=>w.exercises.find(e=>e.id===id)).filter(Boolean);
    const target=Math.max(...exs.map(e=>e.sets.filter(s=>!s.drop).length));
    exs.forEach(e=>{ const drop=e.sets.filter(s=>s.drop); let work=e.sets.filter(s=>!s.drop);
      while(work.length<target){ const last=work[work.length-1]||{w:"",reps:""}; work.push({w:last.w,reps:"",done:false}); }
      while(work.length>target) work.pop();
      e.sets=work.concat(drop);

}
function buildLoggable(e){

  const dropPct=e._dropPct||null;
  const metric=e.metric||"reps";
  const repLabel=metric==="time"?"30–45s":metric==="carry"?"~40 steps":sc.reps;
  let sets;
  if(prev&&prev.sets&&prev.sets.length) sets=prev.sets.filter(s=>!s.drop).map(s=>({w:s.w,reps:s.reps,done:false}));
  else { sets=[]; for(let i=0;i<sc.sets;i++) sets.push({w:"",reps:"",done:false}); }
  if(dropPct){ const base=Math.max(0,...sets.map(s=>parseFloat(s.w)||0)); sets.push({w:base>0?round5(base*(1-dropPct)):"",reps:"",done:false,drop:true}); }

  return {id:e.id,name:e.name,role:e.role,muscles:[...e.primary,...(e.secondary||[])],scheme:sc.sets+" × "+repLabel,metric,
    rest:fmt(restSec),restSec,cue:e.cue,tech:e._tech||null,dropPct,unilateral:!!e.unilateral,barbell:isBarbellEx(e),landmine:(e.requires||[]).includes("landmine"),bandKind,band:prevBand,rpe:prev?(prev.rpe||null):null,sets,

function stationConflict(stations,e){ return (e.stations||[]).some(s=>stations.includes(s)); }
function groupExercises(list,mode){
  const size=mode==="circuit"?3:2; const groups=[]; let remaining=[...list];
  if(mode==="strength"){ const comp=remaining.filter(e=>e.role==="compound"); comp.forEach(e=>{ remaining=remaining.filter(x=>x!==e); groups.push({type:"straight",items:[e.id]}); }); }
  while(remaining.length){
    const head=remaining.shift(); const g=[head]; let stn=[...(head.stations||[])];
    if(!head._dropPct){ for(let i=0;i<remaining.length&&g.length<size;){ if(!remaining[i]._dropPct&&!stationConflict(stn,remaining[i])){ stn=stn.concat(remaining[i].stations||[]); g.push(remaining.splice(i,1)[0]); } else i++; } }
    groups.push({type:g.length>1?(mode==="circuit"?"circuit":"superset"):"straight",items:g.map(e=>e.id)});
  }

}
function swapCandidates(exData,w){
  const owned=ownedCaps(); const base=exById(exData.id); if(!base) return [];
  const group=w.groups.find(g=>g.items.includes(exData.id)); const groupStations=[];
  if(group) group.items.filter(id=>id!==exData.id).forEach(id=>{ const o=exById(id); (o.stations||[]).forEach(s=>groupStations.push(s)); });
  const inWO=new Set(w.exercises.map(e=>e.id)); const blocked=new Set(STATE.settings.blocked||[]);
  const cands=EXERCISES.filter(e=>e.type==="strength"&&exAvailable(e,owned)&&e.id!==exData.id&&!inWO.has(e.id)&&!blocked.has(e.id)&&!stationConflict(groupStations,e));
  const bm=new Set([...base.primary,...base.secondary]);
  function score(e){ let s=0; if(e.pattern===base.pattern)s+=3; if(e.role===base.role)s+=1; e.primary.forEach(m=>{if(bm.has(m))s+=2;}); e.secondary.forEach(m=>{if(bm.has(m))s+=1;}); return s; }
  function why(e){ const sh=e.primary.filter(m=>bm.has(m)).map(m=>MUSCLE_LABEL[m]); return (e.pattern===base.pattern?"same movement":sh.length?sh.join("/"):e.role); }
  return cands.map(e=>({e,s:score(e)})).sort((a,b)=>b.s-a.s).slice(0,6).map(o=>({ex:o.e,why:why(o.e)}));
}

/* ---- optional live heart rate over Web Bluetooth ----
   Works when the app runs on its own https page and the watch is broadcasting HR.
   The in-app Claude sandbox blocks Bluetooth, so this degrades gracefully. */
let HR={device:null,char:null,bpm:null,readings:[],connected:false};
async function connectHR(){
  if(HR.connected&&HR.device&&HR.device.gatt){ try{ HR.device.gatt.disconnect(); }catch(e){} return; }
  try{
    if(!(navigator.bluetooth&&navigator.bluetooth.requestDevice)){ toast("Bluetooth isn’t available inside the Claude app — needs the app on its own page"); return; }
    const dev=await navigator.bluetooth.requestDevice({filters:[{services:["heart_rate"]}]});
    const server=await dev.gatt.connect();
    const svc=await server.getPrimaryService("heart_rate");
    const ch=await svc.getCharacteristic("heart_rate_measurement");
    await ch.startNotifications();
    ch.addEventListener("characteristicvaluechanged",e=>{ const v=e.target.value; const f=v.getUint8(0); const bpm=(f&1)?v.getUint16(1,true):v.getUint8(1); if(bpm>0){ HR.bpm=bpm; HR.readings.push(bpm); } updateHRChip(); });
    dev.addEventListener("gattserverdisconnected",()=>{ HR.connected=false; HR.bpm=null; updateHRChip(); });
    HR.device=dev; HR.char=ch; HR.connected=true; updateHRChip(); toast("HR monitor connected");
  }catch(err){ if(err&&(err.name==="NotFoundError"||err.name==="AbortError")) return; toast("Couldn’t connect — check the watch is broadcasting heart rate"); }
}

  el.classList.toggle("on2",!!HR.connected);
  el.innerHTML=`<svg viewBox="0 0 24 24"><path d="M12 20s-7-4.35-7-9a4 4 0 017-2.65A4 4 0 0119 11c0 4.65-7 9-7 9z"/></svg>`+(HR.connected?(HR.bpm?`<b class="mono" style="color:var(--ink)">${HR.bpm}</b>&nbsp;bpm`:"reading…"):"Connect HR");
}

function plateVisual(total,bar,single){

    const list=res.plates.length?res.plates.join(" + "):"—";
    let cap=`On the sleeve: <b>${list}</b> = <b>${res.total} lb</b>`;
    if(res.remainder>0.01) cap+=` <span class="warn">· nearest loadable (off by ${res.remainder.toFixed(1)} lb)</span>`;
    return `<div class="pc-rack">${rack}</div><div class="pc-cap">${cap}</div>`;
  }

  return `<div class="pc-rack">${rack}</div><div class="pc-cap">${cap}</div>`;
}
function plateAddVisual(added,bar,single){
  const sum=(added||[]).reduce((a,b)=>a+b,0);
  const total=single?sum:bar+2*sum;
  const sorted=[...(added||[])].sort((a,b)=>b-a);
  let rack=`<span class="pc-barstub"></span><span class="pc-collar"></span>`;
  if(!sorted.length) rack+=`<span class="pc-side-note" style="margin-left:8px">tap plates to load</span>`;
  sorted.forEach(p=>{ const v=PLATE_VIS[p]; rack+=`<span class="pc-plate" style="height:${v.h}px;width:${v.w}px;background:${v.c}"><i>${p}</i></span>`; });
  const list=sorted.length?sorted.join(" + "):"—";
  let cap=single?`On the sleeve: <b>${list}</b> = <b>${total} lb</b>`:`Per side: <b>${list}</b><br>Total on the ${bar} lb bar: <b>${total} lb</b>`;
  const inv=plateInv(); const need={}; (added||[]).forEach(p=>need[p]=(need[p]||0)+1);

  return `<div class="pc-rack">${rack}</div><div class="pc-cap">${cap}</div>`;
}

function bucketOf(date,period){
  const d=new Date(date);
  if(period==="year") return {k:""+d.getFullYear(),label:""+d.getFullYear(),sort:d.getFullYear()};
  if(period==="week"){ const t=new Date(d); const day=(t.getDay()+6)%7; t.setHours(0,0,0,0); t.setDate(t.getDate()-day); return {k:"w"+t.getTime(),label:(t.getMonth()+1)+"/"+t.getDate(),sort:t.getTime()}; }
  return {k:d.getFullYear()+"-"+(d.getMonth()+1),label:d.toLocaleString(undefined,{month:"short"})+" "+(""+d.getFullYear()).slice(2),sort:d.getFullYear()*12+d.getMonth()};
}
function progData(exId,period){
  const buckets=new Map();

    const done=e.sets.filter(s=>s.done&&(parseFloat(s.w)||0)>0); if(!done.length) return;
    const top=Math.max(...done.map(s=>parseFloat(s.w)||0));
    const e1=Math.max(...done.map(s=>{ const wt=parseFloat(s.w)||0,rp=parseFloat(s.reps)||0; return rp>0?Math.round(wt*(1+rp/30)):wt; }));
    const b=bucketOf(w.date,period); const cur=buckets.get(b.k)||{label:b.label,sort:b.sort,top:0,e1:0};

function importData(json){
  let d; try{ d=JSON.parse(json); }catch(e){ return false; }
  if(!d||typeof d!=="object") return false;
  if(Array.isArray(d.workouts)) STATE.workouts=mergeWorkouts(STATE.workouts,d.workouts);
  if(d.settings){
    STATE.settings.pinned=[...new Set([...(STATE.settings.pinned||[]),...(d.settings.pinned||[])])];
    STATE.settings.blocked=[...new Set([...(STATE.settings.blocked||[]),...(d.settings.blocked||[])])];
    ["daysPerWeek","duration","mode","experience","goal","alarmVol","alarmSound"].forEach(k=>{ if(d.settings[k]!=null) STATE.settings[k]=d.settings[k]; });
    if(d.settings.recWeights) STATE.settings.recWeights=Object.assign(STATE.settings.recWeights||{},d.settings.recWeights);
  }
  if(Array.isArray(d.equipment)){
    const byId={}; d.equipment.forEach(e=>byId[e.id]=e);
    STATE.equipment.forEach(e=>{ if(byId[e.id]) e.on=byId[e.id].on; });
    d.equipment.filter(e=>e.custom&&!STATE.equipment.find(x=>x.id===e.id)).forEach(e=>STATE.equipment.push(e));
  }
  pWo(); pSet(); pEq(); return true;
}

  if(a==="condstart"){ const c=STATE.current.conditioning[+act.dataset.ci]; c._running=true; c._lapStart=Date.now(); renderToday(); return; }
  if(a==="savetpl"){ if(!STATE.current) return; const name=(prompt("Name this workout:",STATE.current.focusName||"My Workout")||"").trim(); if(!name) return; const t={id:"t"+Date.now(),name,focus:STATE.current.focus,focusName:STATE.current.focusName,duration:STATE.current.duration,mode:STATE.current.mode,items:STATE.current.exercises.map(e=>e.id),groups:JSON.parse(JSON.stringify(STATE.current.groups||[])),conds:(STATE.current.conditioning||[]).map(c=>c.id)}; if(!STATE.templates) STATE.templates=[]; STATE.templates.unshift(t); pTpl(); toast("Saved to My Workouts"); return; }
  if(a==="loadtpl"){ const t=(STATE.templates||[]).find(x=>x.id===act.dataset.id); if(!t) return; const exercises=t.items.map(id=>{ const ex=exById(id); return ex?buildLoggable(ex):null; }).filter(Boolean); const have=new Set(exercises.map(e=>e.id)); const groups=(t.groups||[]).map(g=>({type:g.type,items:g.items.filter(id=>have.has(id))})).filter(g=>g.items.length); have.forEach(id=>{ if(!groups.some(g=>g.items.includes(id))) groups.push({type:"straight",items:[id]}); }); const conditioning=(t.conds||[]).map(id=>{ const c=EXERCISES.find(e=>e.id===id); return c?buildCond(c,t.duration):null; }).filter(Boolean); STATE.current={id:"w"+Date.now(),date:Date.now(),focus:t.focus,focusName:t.name,duration:t.duration,mode:t.mode,exercises,conditioning,groups,note:"",fromTpl:t.id}; normalizeGroupSets(STATE.current); pCur(); STATE.tab="today"; render(); toast("Loaded "+t.name); return; }
  if(a==="deltpl"){ if(!confirm("Delete this saved workout?")) return; STATE.templates=(STATE.templates||[]).filter(x=>x.id!==act.dataset.id); pTpl(); renderToday(); return; }
  if(a==="condset"){ const row=act.closest(".setrow"); const c=STATE.current.conditioning[+row.dataset.ci]; const s=c.sets[+row.dataset.cset]; s.done=!s.done; act.classList.toggle("done",s.done); 
    if(s.done&&c._running&&c._lapStart){ const lap=Math.round((Date.now()-c._lapStart)/1000); const tf=(c.fields||[]).find(f=>f.k==="time"); if(tf){ if(!s.vals) s.vals={}; if(!s.vals.time) s.vals.time=fmt(lap); } c._lapStart=Date.now(); }
    pCur();
    if(s.done){ startRest(restForKey("cond_"+c.id,60),c.name+" rest","cond_"+c.id); } return; }
  if(a==="condaddset"){ const c=STATE.current.conditioning[+act.dataset.ci]; if(!c.sets) c.sets=[]; const ns=mkCondSet(c.fields||[{k:"result",l:"Result"}]); ns.w=(c.sets[c.sets.length-1]||{}).w||""; c.sets.push(ns); pCur(); renderToday(); return; }
  if(a==="condrmset"){ const c=STATE.current.conditioning[+act.dataset.ci]; if(c.sets&&c.sets.length>1) c.sets.pop(); pCur(); renderToday(); return; }
  if(a==="condswap"){ const c=STATE.current.conditioning[+act.dataset.ci]; if(UI.openCondSwap.has(c.id)) UI.openCondSwap.delete(c.id); else UI.openCondSwap.add(c.id); renderToday(); return; }
  if(a==="docondswap"){ const ci=+act.dataset.ci; const ex=EXERCISES.find(e=>e.id===act.dataset.id); if(ex){ UI.openCondSwap.delete(STATE.current.conditioning[ci].id); STATE.current.conditioning[ci]=buildCond(ex,STATE.current.duration); pCur(); renderToday(); } return; }
  if(a==="workt"){ startWork(act.dataset.name); return; }
  if(a==="addexpanel"){ UI.addExOpen=!UI.addExOpen; if(!UI.addExOpen) UI.addExQuery=""; renderToday(); return; }
  if(a==="addex"){ const ex=exById(act.dataset.id); if(ex&&!STATE.current.exercises.find(e=>e.id===ex.id)){ STATE.current.exercises.push(buildLoggable(ex)); STATE.current.groups.push({type:"straight",items:[ex.id]}); UI.addExOpen=false; UI.addExQuery=""; pCur(); renderToday(); toast(ex.name+" added"); } return; }
  if(a==="removeex"){ const idx=+act.dataset.ex; const ex=STATE.current.exercises[idx]; if(!ex) return; const id=ex.id; STATE.current.exercises.splice(idx,1); STATE.current.groups.forEach(g=>{ g.items=g.items.filter(x=>x!==id); }); STATE.current.groups=STATE.current.groups.filter(g=>g.items.length); pCur(); renderToday(); return; }
  if(a==="addcardio"){ const owned=ownedCaps(); const blocked=new Set(STATE.settings.blocked||[]); const inWO=new Set((STATE.current.conditioning||[]).map(x=>x.id)); const avail=EXERCISES.filter(e=>e.type==="conditioning"&&exAvailable(e,owned)&&!blocked.has(e.id)&&!inWO.has(e.id)); if(!avail.length){ toast("No conditioning available with your gear"); return; } const pick=avail[Math.floor(Math.random()*avail.length)]; if(!STATE.current.conditioning) STATE.current.conditioning=[]; STATE.current.conditioning.push(buildCond(pick,STATE.current.duration)); pCur(); renderToday(); toast("Cardio added — Swap to change it"); return; }
  if(a==="removecond"){ const ci=+act.dataset.ci; if(STATE.current.conditioning) STATE.current.conditioning.splice(ci,1); pCur(); renderToday(); return; }
  if(a==="recmore"||a==="recless"){ const id=act.dataset.id; if(!STATE.settings.recWeights) STATE.settings.recWeights={}; const cur=STATE.settings.recWeights[id]||0; const want=a==="recmore"?1:-1; if(cur===want) delete STATE.settings.recWeights[id]; else STATE.settings.recWeights[id]=want; pSet(); renderToday(); toast(a==="recmore"?"Will show up more often":"Will show up less often"); return; }
  if(a==="setband"){ const ex=STATE.current.exercises[+act.dataset.ex]; if(ex){ ex.band=ex.band===act.dataset.band?null:act.dataset.band; pCur(); renderToday(); } return; }
  if(a==="pcmode"){ UI.plateMode[act.dataset.ex]=act.dataset.mode; renderToday(); return; }
  if(a==="pcadd"){ const id=act.dataset.ex; if(!UI.plateAdd[id]) UI.plateAdd[id]=[]; UI.plateAdd[id].push(+act.dataset.p); renderToday(); return; }
  if(a==="pcclear"){ UI.plateAdd[act.dataset.ex]=[]; renderToday(); return; }
  if(a==="addset"){ const idx=+act.dataset.ex; const cur=STATE.current.exercises[idx]; const grp=STATE.current.groups.find(g=>g.items.includes(cur.id)); const targets=(grp&&grp.items.length>1)?grp.items.map(id=>STATE.current.exercises.find(e=>e.id===id)).filter(Boolean):[cur];
    targets.forEach(ex=>{ const di=ex.sets.findIndex(s=>s.drop); const work=ex.sets.filter(s=>!s.drop); const last=work[work.length-1]||{w:"",reps:""}; const ns={w:last.w,reps:"",done:false}; if(di>=0) ex.sets.splice(di,0,ns); else ex.sets.push(ns); });
    pCur(); renderToday(); return; }
  if(a==="rpe"){ const ex=STATE.current.exercises[+act.dataset.ex]; const n=+act.dataset.rpe; ex.rpe=ex.rpe===n?null:n; pCur(); renderToday(); return; }
  if(a==="rest"){ startRest(restForKey(act.dataset.key,+act.dataset.sec),act.dataset.name,act.dataset.key); return; }
  if(a==="howto"){ openHowto(act.dataset.id,act.dataset.name); return; }
  if(a==="pin"){ const id=act.dataset.id; const arr=STATE.settings.pinned; const i=arr.indexOf(id); if(i>=0) arr.splice(i,1); else arr.push(id); pSet(); renderToday(); toast(i>=0?"Unpinned":"Pinned"); return; }
  if(a==="swap"){ const id=STATE.current.exercises[+act.dataset.ex].id; if(UI.openSwap.has(id)) UI.openSwap.delete(id); else UI.openSwap.add(id); renderToday(); return; }
  if(a==="plates"){ const id=STATE.current.exercises[+act.dataset.ex].id; if(UI.openPlates.has(id)) UI.openPlates.delete(id); else UI.openPlates.add(id); renderToday(); return; }
  if(a==="dospwap"){ const idx=+act.dataset.ex; const ne=exById(act.dataset.id); const old=STATE.current.exercises[idx]; UI.openSwap.delete(old.id);
    STATE.current.groups.forEach(g=>{ const gi=g.items.indexOf(old.id); if(gi>=0) g.items[gi]=ne.id; }); STATE.current.exercises[idx]=buildLoggable(ne); pCur(); renderToday(); toast("Swapped"); return; }
  if(a==="ban"){ const id=act.dataset.id; if(!STATE.settings.blocked.includes(id)) STATE.settings.blocked.push(id); pSet();
    UI.openSwap.add(id); renderToday(); toast("Banned — pick a replacement below"); return; }
  if(a==="finish"){ if(!STATE.current) return; const any=STATE.current.exercises.some(e=>e.sets.some(s=>s.done))||(STATE.current.conditioning||[]).some(c=>(c.sets&&c.sets.some(s=>s.done))||c.done); if(!any){ toast("Mark a set or a conditioning drill done first"); return; }
    if(STATE.current.startedAt) STATE.current.actualSec=Math.round((Date.now()-STATE.current.startedAt)/1000);
    if(HR.readings.length){ STATE.current.hrAvg=Math.round(HR.readings.reduce((a,b)=>a+b,0)/HR.readings.length); STATE.current.hrMax=Math.max(...HR.readings); } HR.readings=[];
    STATE.current.date=Date.now(); STATE.current.exercises.forEach(e=>{ delete e._prev; delete e._dropManual; }); STATE.workouts.unshift(STATE.current); STATE.current=null; STATE.settings._focus=null; UI.openSwap.clear(); UI.openPlates.clear();
    pWo(); pCur(); pSet(); stopRest(); stopWoTimer(); releaseWake(); STATE.tab="log"; render(); toast("Logged — nice work"); return; }
  if(a==="discard"){ STATE.current=null; STATE.settings._focus=null; pCur(); pSet(); stopWoTimer(); releaseWake(); renderToday(); return; }
  if(a==="print"){ doPrint(STATE.current); return; }
  if(a==="printlog"){ doPrint(STATE.workouts[+act.dataset.i]); return; }
  if(a==="expand"){ document.getElementById("exp"+act.dataset.i).classList.toggle("open"); return; }
  if(a==="togglegear"){ const eq=STATE.equipment.find(x=>x.id===act.dataset.id); eq.on=!eq.on; pEq(); renderGear(); return; }
  if(a==="delgear"){ STATE.equipment=STATE.equipment.filter(x=>x.id!==act.dataset.id); pEq(); renderGear(); return; }
  if(a==="addgear"){ const nm=document.getElementById("ng_name").value.trim(); if(!nm){ toast("Name it first"); return; } const cap=document.getElementById("ng_cap").value;
    STATE.equipment.push({id:"c"+Date.now(),cat:document.getElementById("ng_cat").value,name:nm,note:"added by you",caps:[cap],on:true,custom:true,bar:cap==="barbell"||cap==="trapbar"?45:undefined,plateInv:cap==="barbell"?{...DEFAULT_PLATE_INV}:undefined}); pEq(); renderGear(); toast("Added"); return; }
  if(a==="unpin"){ STATE.settings.pinned=STATE.settings.pinned.filter(x=>x!==act.dataset.id); pSet(); renderSettings(); return; }
  if(a==="unban"){ STATE.settings.blocked=STATE.settings.blocked.filter(x=>x!==act.dataset.id); pSet(); renderSettings(); toast("Restored"); return; }
  if(a==="export"){ const data=JSON.stringify({equipment:STATE.equipment,settings:STATE.settings,workouts:STATE.workouts},null,2); const blob=new Blob([data],{type:"application/json"}); const url=URL.createObjectURL(blob); const link=document.createElement("a"); link.href=url; link.download="rack-and-roll-backup.json"; link.click(); URL.revokeObjectURL(url); toast("Backup downloaded"); return; }
  if(a==="togglewake"){ STATE.settings.keepAwake=!STATE.settings.keepAwake; pSet(); if(STATE.settings.keepAwake&&STATE.current&&STATE.current.startedAt) requestWake(); else releaseWake(); renderSettings(); return; }
  if(a==="testalarm"){ ensureAudio(); beep(); if(navigator.vibrate) navigator.vibrate([500,140,500,140,500]); return; }
  if(a==="sync"){ openSync(); return; }
  if(a==="wipe"){ if(confirm("Erase all logs, pins, blocks, custom gear, and settings? Can’t be undone.")){ STATE.workouts=[]; STATE.current=null; STATE.settings={daysPerWeek:5,duration:45,mode:"strength",experience:"intermediate",units:"lb",blocked:[],pinned:[]}; STATE.equipment=DEFAULT_EQUIPMENT.map(e=>({...e})); pWo();pCur();pSet();pEq(); STATE.tab="today"; render(); toast("Reset"); } return; }
});

view.addEventListener("input",e=>{
  const inp=e.target;
  if(inp.dataset.k&&STATE.current){ const row=inp.closest(".setrow"); const exi=+row.dataset.ex, si=+row.dataset.set; const ex=STATE.current.exercises[exi]; const k=inp.dataset.k; ex.sets[si][k]=inp.value;
    const eflag=k==="w"?"_we":"_re"; ex.sets[si][eflag]=true;
    // fill-down: carry this value to lower sets you haven't manually edited (skips drop sets)
    if(!ex.sets[si].drop){ for(let j=si+1;j<ex.sets.length;j++){ const sj=ex.sets[j]; if(sj.drop||sj[eflag]) continue; sj[k]=inp.value; const inpj=row.parentElement.querySelector('.setrow[data-set="'+j+'"] input[data-k="'+k+'"]'); if(inpj&&document.activeElement!==inpj) inpj.value=inp.value; } }
    if(k==="w"&&ex.dropPct){ const di=ex.sets.findIndex(s=>s.drop); if(di>=0){ if(si===di){ ex._dropManual=true; } else if(!ex._dropManual){ const base=Math.max(0,...ex.sets.filter((s,i)=>i!==di).map(s=>parseFloat(s.w)||0)); const dw=base>0?round5(base*(1-ex.dropPct)):""; ex.sets[di].w=dw; const di2=row.parentElement.querySelector('.setrow[data-set="'+di+'"] input[data-k="w"]'); if(di2&&document.activeElement!==di2) di2.value=dw; } } }
    pCur(); return; }
  if(inp.dataset.addexq!=null&&STATE.current){ UI.addExQuery=inp.value; renderToday(); const s=document.getElementById("addExSearch"); if(s){ s.focus(); const v=s.value; s.value=""; s.value=v; } return; }
  if((inp.dataset.ck||inp.dataset.cf)&&STATE.current){ const row=inp.closest(".setrow"); const c=STATE.current.conditioning[+row.dataset.ci]; if(!c.sets) c.sets=[mkCondSet(c.fields)]; const s=c.sets[+row.dataset.cset]; if(inp.dataset.ck==="w"){ s.w=inp.value; } else { if(!s.vals) s.vals={}; s.vals[inp.dataset.cf]=inp.value; } pCur(); return; }
  if(inp.dataset.field==="note"&&STATE.current){ STATE.current.note=inp.value; pCur(); return; }
  if(inp.dataset.range==="alarmvol"){ STATE.settings.alarmVol=Math.max(0.15,Math.min(1,(+inp.value||90)/100)); const lbl=document.getElementById("alarmVolLbl"); if(lbl) lbl.textContent=Math.round(STATE.settings.alarmVol*100)+"%"; pSet(); return; }
  if(inp.dataset.pc==="w"){ const panel=inp.closest(".pcalc"); const id=panel.dataset.ex; UI.plateW[id]=inp.value; const single=panel.dataset.single==="1"; const bar=single?0:barWeightFor({id,requires:exById(id).requires}); panel.querySelector(".pc-body").innerHTML=plateVisual(inp.value,bar,single); return; }
});
view.addEventListener("change",e=>{
  const pe=e.target.closest("[data-prog='ex']"); if(pe){ UI.progEx=pe.value; renderProgress(); return; }
  const sel=e.target.closest("[data-set]");
  if(sel){ let v=sel.value; if(sel.dataset.set==="daysPerWeek"||sel.dataset.set==="duration") v=+v; STATE.settings[sel.dataset.set]=v; pSet(); renderWeekBadge(); if(sel.dataset.set==="goal"&&STATE.tab==="set") renderSettings(); if(sel.dataset.set==="alarmSound"){ ensureAudio(); playAlarm(); } return; }
  const pb=e.target.closest("[data-pc='bar']");
  if(pb){ const panel=pb.closest(".pcalc"); const id=panel.dataset.ex; UI.plateBar[id]=+pb.value; renderToday(); return; }
  const ps=e.target.closest("[data-pc='side']");
  if(ps){ const panel=ps.closest(".pcalc"); const id=panel.dataset.ex; UI.plateSide[id]=ps.value; renderToday(); return; }
});

boot();
</script>
<script>if("serviceWorker" in navigator){window.addEventListener("load",function(){navigator.serviceWorker.register("sw.js").then(function(reg){reg.addEventListener("updatefound",function(){var nw=reg.installing;if(!nw)return;nw.addEventListener("statechange",function(){if(nw.state==="installed"&&navigator.serviceWorker.controller){var b=document.getElementById("updateBar");if(b)b.style.display="flex";}});});}).catch(function(){});var refreshing=false;navigator.serviceWorker.addEventListener("controllerchange",function(){if(refreshing)return;refreshing=true;location.reload();});});}
function rrUpdate(){if("serviceWorker" in navigator){navigator.serviceWorker.getRegistration().then(function(r){if(r&&r.waiting){r.waiting.postMessage("skipWaiting");}else{location.reload();}}).catch(function(){location.reload();});}else{location.reload();}}</script>
