<!doctype html>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Rack & Roll — Garage Training</title>
<meta name="theme-color" content="#0E1013">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rack & Roll">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<link rel="icon" type="image/png" href="icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;500;600;700&family=Inter:wght@400;500;600&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0E1013; --panel:#181B20; --panel2:#20242B; --line:#2C313A; --line2:#3A414C;
  --ink:#F2F4F7; --muted:#C7CED9; --faint:#9CA4B0;
  --amber:#F2C14E; --amber-d:#C99A2E; --steel:#9FB6CE;
  --ready:#6FBF73; --mid:#E0A93B; --cold:#C8554C;
  /* plate colors per user spec */
  --p45:#2F6FB0; --p25:#3A9D5A; --p10:#8B929C; --p5:#2F6FB0; --p25s:#3A9D5A;
  --radius:5px; --tap:46px;
  --disp:'Oswald',system-ui,sans-serif;
  --body:'Inter',system-ui,sans-serif;
  --mono:'JetBrains Mono',ui-monospace,monospace;
}
*{box-sizing:border-box}
html,body{margin:0;background:var(--bg);color:var(--ink);font-family:var(--body);-webkit-text-size-adjust:100%}
body{padding-bottom:84px;line-height:1.45;font-size:15px}
button{font-family:inherit;color:inherit;cursor:pointer}
input,select,textarea{font-family:inherit}
h1,h2,h3{font-family:var(--disp);font-weight:600;letter-spacing:.02em;margin:0}
.mono{font-family:var(--mono)}
.app{max-width:680px;margin:0 auto;padding:0 14px}

header{position:sticky;top:0;z-index:40;background:linear-gradient(180deg,#15181D,#101216);border-bottom:1px solid var(--line)}
header::after{content:"";display:block;height:4px;background:repeating-linear-gradient(135deg,var(--amber-d) 0 3px,transparent 3px 7px);opacity:.55}
.hbar{max-width:680px;margin:0 auto;padding:11px 14px;display:flex;align-items:center;gap:11px}
.logo{font-family:var(--disp);font-weight:700;font-size:21px;letter-spacing:.06em;text-transform:uppercase;line-height:1}
.logo b{color:var(--amber)}
.logo small{display:block;font-family:var(--mono);font-weight:400;font-size:9.5px;letter-spacing:.34em;color:var(--faint);margin-top:3px}
.week{margin-left:auto;text-align:right;font-family:var(--mono);font-size:11px;color:var(--muted);line-height:1.3}
.week b{color:var(--ink);font-size:15px}

nav{position:fixed;bottom:0;left:0;right:0;z-index:50;background:#101216;border-top:1px solid var(--line);display:flex;justify-content:center;padding-bottom:env(safe-area-inset-bottom)}
nav .inner{display:flex;max-width:680px;width:100%}
nav button{flex:1;background:none;border:0;padding:9px 4px 10px;display:flex;flex-direction:column;align-items:center;gap:3px;color:var(--faint);font-family:var(--disp);font-size:11.5px;letter-spacing:.08em;text-transform:uppercase;border-top:2px solid transparent;margin-top:-1px}
nav button svg{width:21px;height:21px;stroke:currentColor;fill:none;stroke-width:1.7}
nav button.on{color:var(--amber);border-top-color:var(--amber)}

.panel{background:var(--panel);border:1px solid var(--line);border-radius:var(--radius);padding:14px;margin:12px 0}
.eyebrow{font-family:var(--mono);font-size:10.5px;letter-spacing:.22em;text-transform:uppercase;color:var(--faint)}
.row{display:flex;gap:8px;align-items:center}
.spread{display:flex;justify-content:space-between;align-items:center;gap:10px}
.muted{color:var(--muted)}
.btn{background:var(--panel2);border:1px solid var(--line2);border-radius:var(--radius);padding:0 14px;min-height:var(--tap);font-family:var(--disp);font-size:14px;letter-spacing:.04em;text-transform:uppercase;display:inline-flex;align-items:center;justify-content:center;gap:7px}
.btn:active{transform:translateY(1px)}
.btn.primary{background:var(--amber);color:#1a1400;border-color:var(--amber);font-weight:600}
.btn.ghost{background:transparent}
.btn.sm{min-height:36px;font-size:12px;padding:0 10px}
.btn.block{width:100%}
.seg{display:flex;border:1px solid var(--line2);border-radius:var(--radius);overflow:hidden;flex-wrap:wrap}
.seg button{flex:1 1 auto;background:var(--panel);border:0;border-right:1px solid var(--line);min-height:var(--tap);font-family:var(--disp);font-size:13.5px;letter-spacing:.03em;color:var(--muted);text-transform:uppercase;padding:0 6px;white-space:nowrap}
.seg button:last-child{border-right:0}
.seg button.on{background:var(--amber);color:#1a1400;font-weight:600}

/* readiness stack */
.stack-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(54px,1fr));gap:8px;margin-top:11px}
.mstack{display:flex;flex-direction:column;align-items:center;gap:6px}
.plates{width:100%;height:70px;display:flex;flex-direction:column-reverse;gap:2px}
.pl{height:6px;border-radius:1.5px;background:var(--line)}
.pl.lit{background:var(--seg-c,var(--ready))}
.mlabel{font-family:var(--mono);font-size:9.5px;letter-spacing:.04em;color:var(--muted);text-transform:uppercase;text-align:center;line-height:1.1}
.mval{font-family:var(--mono);font-size:10px;color:var(--faint)}

.wo-head{display:flex;align-items:flex-end;justify-content:space-between;gap:10px}
.wo-title{font-family:var(--disp);font-size:27px;font-weight:700;line-height:1;text-transform:uppercase;letter-spacing:.01em}
.tag{display:inline-block;font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;border:1px solid var(--line2);border-radius:3px;padding:3px 7px;color:var(--muted)}
.tag.amber{border-color:var(--amber-d);color:var(--amber)}
.tag.steel{border-color:#3d5168;color:var(--steel)}
.group{border:1px solid var(--line);border-radius:var(--radius);margin:11px 0;overflow:hidden}
.group.superset{border:2px solid var(--ready);box-shadow:0 0 0 1px rgba(111,191,115,.12),0 2px 14px rgba(111,191,115,.12)}
.group.circuit{border:2px solid var(--amber-d);box-shadow:0 0 0 1px rgba(201,154,46,.12),0 2px 14px rgba(242,193,78,.1)}
.setrow.cuenext{background:rgba(242,193,78,.16);border-radius:7px;box-shadow:0 0 0 2px var(--amber);transition:background .3s}
.group-h{background:var(--panel2);padding:7px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--line)}
.group-h .gk{font-family:var(--disp);font-size:13px;letter-spacing:.1em;text-transform:uppercase;color:var(--amber)}
.group-h .gk.superset{background:var(--ready);color:#0d1a0e;padding:4px 11px;border-radius:6px;font-size:15px;letter-spacing:.14em;box-shadow:0 0 0 1px var(--ready),0 2px 8px rgba(111,191,115,.28)}
.group-h .gk.circuit{background:var(--amber);color:#160f00;padding:4px 11px;border-radius:6px;font-size:15px;letter-spacing:.14em;box-shadow:0 0 0 1px var(--amber),0 2px 8px rgba(245,176,66,.26)}
.group-h .gr{margin-left:auto;font-family:var(--mono);font-size:10.5px;color:var(--faint)}
.ex{padding:12px;border-bottom:1px solid var(--line)}
.ex:last-child{border-bottom:0}
.ex-top{display:flex;align-items:baseline;gap:9px}
.ex-name{font-family:var(--disp);font-size:17px;font-weight:600;letter-spacing:.01em}
.ex-scheme{margin-left:auto;font-family:var(--mono);font-size:12px;color:var(--amber);white-space:nowrap}
.mtags{display:flex;flex-wrap:wrap;gap:8px;margin-top:5px}
.mtag{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.05em}
.mtag.pri{font-weight:700}
.mtag.sec{opacity:.72;font-weight:400}
.ex-cue{font-size:12.5px;color:var(--muted);margin-top:3px}
.overload{font-size:12.5px;color:var(--ready);margin-top:5px;font-weight:600}
.warmup-panel{margin:8px 0;padding:10px 12px;border:1px solid var(--line2);border-radius:8px;background:var(--panel2)}
.warmup-panel .wu-h{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:var(--amber);margin-bottom:6px}
.wu-row{display:flex;justify-content:space-between;padding:3px 0;font-size:13px;color:var(--ink)}
.recency{display:flex;flex-wrap:wrap;gap:5px 14px;margin-bottom:12px;font-family:var(--mono);font-size:11px}
.rec-item b{color:var(--muted);font-weight:600}
.volrow{display:flex;align-items:center;gap:9px;padding:3px 0}
.volrow .vlab{flex:0 0 68px;font-size:12.5px;color:var(--ink)}
.volrow .vbar{flex:1;height:12px;background:var(--panel2);border-radius:6px;overflow:hidden}
.volrow .vfill{height:100%;background:var(--amber);border-radius:6px}
.volrow .vnum{flex:0 0 auto;font-size:12px;color:var(--muted);min-width:26px;text-align:right}
.prrow{display:flex;align-items:center;gap:10px;padding:6px 0;border-bottom:1px solid var(--line)}
.prrow .prn{flex:1;font-size:13.5px;color:var(--ink)}
.prrow .prw{font-size:14px;color:var(--amber);font-weight:700}
.prrow .pre{flex:0 0 auto}
.pr-badge{font-size:11px;color:var(--amber);font-weight:700;margin-left:4px}
.feelrow{padding:7px 0;border-bottom:1px solid var(--line)}
.feelhd{display:flex;align-items:center;gap:8px;font-size:13px}
.feelrpe{margin-left:auto;font-family:var(--mono);font-size:12px;font-weight:700}
.feelnote{font-size:12.5px;color:var(--muted);margin-top:3px;line-height:1.35}
.ex-tech{font-size:12px;color:var(--steel);margin-top:5px;font-style:italic}
.ctrls{display:flex;gap:6px;margin-top:9px;flex-wrap:wrap}
.chip{background:var(--panel2);border:1px solid var(--line2);border-radius:4px;min-height:34px;padding:0 9px;font-family:var(--mono);font-size:11px;letter-spacing:.04em;color:#CBD2DC;display:inline-flex;align-items:center;gap:5px;text-transform:uppercase}
.chip svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.8}
.chip.on{background:var(--amber);border-color:var(--amber);color:#160f00;font-weight:600}
.chip.on svg{stroke:#160f00}
.chip.on2{border-color:#E06A5C;color:#E06A5C}
.chip.on2 svg{fill:#E06A5C;stroke:#E06A5C}
.mmap{margin:10px 0 2px;border:1px solid var(--line2);border-radius:8px;padding:11px 12px;background:var(--panel2)}
.mmap-h{display:flex;justify-content:space-between;align-items:center;margin-bottom:9px}
.mrow{display:grid;grid-template-columns:58px 1fr 46px;align-items:center;gap:9px;margin:5px 0}
.mm-name{font-size:12px;color:var(--ink)}
.mm-bar{height:8px;background:var(--bg);border-radius:5px;overflow:hidden}
.mm-bar i{display:block;height:100%;border-radius:5px}
.mm-bar i.fresh{background:var(--ready)} .mm-bar i.mid{background:var(--mid)} .mm-bar i.tired{background:var(--cold)}
.mm-ago{font-family:var(--mono);font-size:10.5px;text-transform:uppercase;letter-spacing:.04em;text-align:right}
.mm-ago.fresh{color:var(--ready)} .mm-ago.mid{color:var(--mid)} .mm-ago.tired{color:var(--cold)}
.chip.rest{color:var(--steel);border-color:#34465a}
.chip.pin.on svg{fill:#160f00}
a.chip{text-decoration:none}
.chip.yt{color:#E06A5C;border-color:#5A3A36}
.chip.yt svg{stroke-width:1.6}

.sets{margin-top:10px;display:flex;flex-direction:column;gap:6px}
.setrow{display:grid;grid-template-columns:24px 1fr 1fr 40px;gap:7px;align-items:center}
.setrow .si{font-family:var(--mono);font-size:12px;color:var(--faint);text-align:center}
.setrow .hdr{font-family:var(--mono);font-size:10.5px;letter-spacing:.09em;text-transform:uppercase;color:#C3CAD5;text-align:center;padding-bottom:5px;border-bottom:1px solid var(--line2)}
.fld{position:relative}
.fld input{width:100%;min-height:40px;background:var(--bg);border:1px solid var(--line2);border-radius:var(--radius);color:var(--ink);font-family:var(--mono);font-size:15px;text-align:center;padding:0 4px}
.fld input:focus{outline:none;border-color:var(--amber)}
.fld .u{position:absolute;right:7px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:9.5px;color:var(--faint);pointer-events:none}
.chk{width:40px;height:40px;border:1px solid var(--line2);border-radius:var(--radius);background:var(--bg);display:flex;align-items:center;justify-content:center}
.chk svg{width:20px;height:20px;stroke:var(--faint);fill:none;stroke-width:2.4;opacity:.4}
.chk.done{background:var(--ready);border-color:var(--ready)}
.chk.done svg{stroke:#0c1a0d;opacity:1}
.addset{font-family:var(--mono);font-size:11px;color:var(--steel);background:none;border:0;padding:4px 0;text-align:left}
.droprow .si{color:var(--cold);font-weight:700}
.droprow input{border-color:#5a3a36}

/* RPE */
.rpe{display:flex;align-items:center;gap:6px;margin-top:10px;flex-wrap:wrap}
.rpe .lab{font-family:var(--mono);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--faint)}
.rpe button{min-width:36px;min-height:32px;background:var(--bg);border:1px solid var(--line2);border-radius:4px;font-family:var(--mono);font-size:12px;color:var(--muted)}
.rpe button.on{background:var(--steel);border-color:var(--steel);color:#06121d;font-weight:700}
.rpe .hint{font-size:10.5px;color:var(--faint);flex-basis:100%;margin-top:1px}

/* swap panel */
.swap{margin-top:10px;border:1px dashed var(--line2);border-radius:var(--radius);padding:10px;background:#13161a}
.swap .ban{width:100%;justify-content:flex-start;color:var(--cold);border-color:#5a3330;margin-bottom:8px}
.swap .alt{display:flex;align-items:center;gap:9px;padding:7px 0;border-bottom:1px solid var(--line)}
.swap .alt:last-child{border-bottom:0}
.swap .alt .an{flex:1;font-size:14px}
.swap .alt .an small{display:block;color:var(--faint);font-family:var(--mono);font-size:10px;margin-top:1px}

/* plate calculator */
.pcalc{margin-top:10px;border:1px solid var(--line2);border-radius:var(--radius);padding:11px;background:#0c0f13}
.pc-in{display:flex;gap:8px;align-items:center;margin-bottom:11px;flex-wrap:wrap}
.pc-in label{font-family:var(--mono);font-size:10px;letter-spacing:.08em;text-transform:uppercase;color:var(--faint)}
.pc-in input{width:84px;min-height:38px;background:var(--bg);border:1px solid var(--line2);border-radius:var(--radius);color:var(--ink);font-family:var(--mono);font-size:16px;text-align:center}
.pc-in select{min-height:38px;background:var(--bg);border:1px solid var(--line2);border-radius:var(--radius);color:var(--ink);font-family:var(--mono);font-size:13px;padding:0 6px}
.pc-rack{display:flex;align-items:center;min-height:128px;padding:6px 0;overflow-x:auto}
.pc-barstub{flex:none;width:30px;height:13px;background:linear-gradient(180deg,#c9ced6,#7c828c);border-radius:2px;box-shadow:inset 0 0 0 1px #555}
.pc-collar{flex:none;width:10px;height:22px;background:#9aa0aa;border-radius:2px;margin:0 1px}
.pc-plate{flex:none;border-radius:3px;margin-right:3px;display:flex;align-items:center;justify-content:center;box-shadow:inset 0 0 0 1px rgba(255,255,255,.18),inset 0 0 0 6px rgba(0,0,0,.12);position:relative}
.pc-plate i{font-family:var(--mono);font-style:normal;font-size:9px;font-weight:700;color:rgba(255,255,255,.92);writing-mode:vertical-rl;text-orientation:mixed;letter-spacing:.5px}
.pc-cap{font-family:var(--mono);font-size:12px;color:var(--muted);margin-top:9px;line-height:1.5}
.pc-cap b{color:var(--ink)}
.pc-cap .warn{color:var(--mid)}
.pc-side-note{font-family:var(--mono);font-size:10px;color:var(--faint);text-transform:uppercase;letter-spacing:.08em}

.cond{padding:12px;background:linear-gradient(180deg,#1b1d22,#16181c)}
.cond .ex-name{color:var(--ink)}
.cond .proto{font-family:var(--mono);font-size:13.5px;color:var(--amber);margin-top:6px;line-height:1.5}

.eq-cat{font-family:var(--disp);font-size:13px;letter-spacing:.12em;text-transform:uppercase;color:var(--faint);margin:16px 0 7px}
.eq{display:flex;align-items:center;gap:11px;padding:10px 0;border-bottom:1px solid var(--line)}
.eq:last-child{border-bottom:0}
.eq .nm{flex:1}
.eq .nm small{display:block;color:var(--faint);font-family:var(--mono);font-size:10.5px;margin-top:2px}
.sw{width:46px;height:27px;border-radius:14px;background:var(--line);border:1px solid var(--line2);position:relative;flex:none;transition:background .15s}
.sw::after{content:"";position:absolute;top:2px;left:2px;width:21px;height:21px;border-radius:50%;background:#cdd3db;transition:left .15s}
.sw.on{background:var(--amber-d)}
.sw.on::after{left:21px;background:#fff}
.eq.off .nm{opacity:.4}
.addgear{display:grid;grid-template-columns:1fr;gap:8px}

.logitem{padding:13px 0;border-bottom:1px solid var(--line)}
.logitem:last-child{border-bottom:0}
.logitem .dt{font-family:var(--mono);font-size:11px;color:var(--faint)}
.logitem .ti{font-family:var(--disp);font-size:18px;font-weight:600;text-transform:uppercase}
.logitem .meta{font-family:var(--mono);font-size:11px;color:var(--muted);margin-top:3px}
.exp{margin-top:9px;font-size:13px;color:var(--muted);display:none}
.exp.open{display:block}
.exp .er{display:flex;justify-content:space-between;gap:10px;padding:3px 0;border-bottom:1px dashed var(--line)}
.exp .er .mono{color:var(--ink);text-align:right}

.frow{display:flex;align-items:center;gap:10px;padding:11px 0;border-bottom:1px solid var(--line)}
.frow:last-child{border-bottom:0}
.frow label{flex:1;font-size:14px}
.frow label small{display:block;color:var(--faint);font-size:11.5px;margin-top:2px}
select.in,input.in,textarea.in{min-height:42px;background:var(--bg);border:1px solid var(--line2);border-radius:var(--radius);color:var(--ink);padding:0 10px;font-size:14px}
select.in{min-width:108px}
.manage{display:flex;align-items:center;gap:9px;padding:9px 0;border-bottom:1px solid var(--line)}
.bandguide{display:flex;flex-direction:column;gap:2px}
.brow{display:flex;align-items:center;gap:10px;padding:4px 0}
.brow .mn{font-size:13px;color:var(--ink);flex:1}
.brow .mono{font-size:11px;color:var(--muted)}
.bswatch{width:22px;height:14px;border-radius:4px;flex:none}
.pc-tabs{display:flex;align-items:center;gap:6px;margin-bottom:9px;flex-wrap:wrap}
.pc-tab{font-family:var(--mono);font-size:11px;text-transform:uppercase;letter-spacing:.04em;padding:5px 10px;border:1px solid var(--line2);border-radius:6px;background:var(--bg);color:var(--muted)}
.pc-tab.on{background:var(--amber);border-color:var(--amber);color:#160f00;font-weight:600}
.pc-side{width:auto;margin-left:auto;font-size:12px;padding:5px 8px}
.pc-plates{display:flex;flex-wrap:wrap;gap:7px;margin:4px 0 10px}
.pc-add{font-family:var(--mono);font-size:14px;font-weight:600;padding:8px 12px;border:1px solid var(--amber-d);border-radius:7px;background:var(--panel2);color:var(--amber);min-width:48px}
.pc-add:active{transform:scale(.95)}
.pc-add.clear{border-color:var(--line2);color:var(--cold)}
.chip.danger{border-color:#5a3a36;color:var(--cold)}
.chip.ytl{border-color:#3a2a2a;color:#e06a5c;text-decoration:none}
.bandpick{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin:8px 0 2px;padding:8px 10px;border:1px solid var(--line2);border-radius:8px;background:var(--panel2)}
.bp-lab{font-size:12px;color:var(--muted)}
.bp-dots{display:flex;gap:7px;margin-left:auto;flex-wrap:wrap}
.bp-dot{width:24px;height:24px;border-radius:50%;border:2px solid transparent;box-shadow:0 0 0 1px var(--line2)}
.bp-dot.on{border-color:var(--ink);box-shadow:0 0 0 2px var(--amber)}
.bp-dot:active{transform:scale(.9)}
.setband-sw{width:100%;min-height:34px;border-radius:7px;border:1px solid var(--line2);font-family:var(--mono);font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.02em;padding:0 4px}
.setband-sw:active{transform:scale(.96)}
.ungroup-btn{margin-left:8px;min-height:26px}
.librow{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--line)}
.librow.banned{opacity:.55}
.libnm{flex:1;font-size:13.5px;color:var(--ink);line-height:1.25}

/* ---------------- Storage ----------------
   Layered for reliability: device-local (synchronous, survives the webview reload

const MEM={};
const hasStore=typeof window!=="undefined"&&window.storage&&typeof window.storage.get==="function";
const LS=(()=>{ try{ const k="__rr_probe"; window.localStorage.setItem(k,"1"); window.localStorage.removeItem(k); return window.localStorage; }catch(e){ return null; } })();
const BUILD="2026.07.31";
function lsGet(k){ if(!LS) return null; try{ const v=LS.getItem(k); return v!=null?JSON.parse(v):null; }catch(e){ return null; } }
function lsSet(k,v){ if(!LS) return; try{ LS.setItem(k,JSON.stringify(v)); }catch(e){} }
async function loadKey(k){
  const local=lsGet(k); if(local!=null) return local;          // device-local first — reliable across reloads
  if(hasStore){ try{ const r=await window.storage.get(k); if(r&&r.value!=null){ const val=JSON.parse(r.value); lsSet(k,val); return val; } }catch(e){} } // backfill from account storage
  return (k in MEM)?MEM[k]:null;
}
async function saveKey(k,v){ MEM[k]=v; lsSet(k,v); if(hasStore){ try{ await window.storage.set(k,JSON.stringify(v)); }catch(e){} } }

  const map=new Map();
  [...(a||[]),...(b||[])].forEach(w=>{ if(!w) return; const key=w.id||(w.date+"_"+w.focus); const ex=map.get(key); if(!ex||(w.date||0)>(ex.date||0)) map.set(key,w); });
  return [...map.values()].sort((x,y)=>(y.date||0)-(x.date||0));
}

const GUIDES={
  bb_bench:"Eyes under the bar, shoulder blades pinned down and back, feet planted. Lower to mid-chest with elbows tucked ~45°, then press up and slightly back over the shoulders. Avoid flaring the elbows straight out.",
  bb_incl:"Bench at ~30°. Same tight setup as flat bench; lower to the upper chest just below the collarbone, press up. Don't set the incline so steep it becomes a shoulder press.",
  db_bench:"Bells over the chest, wrists stacked over elbows. Lower until the elbows are just below the bench, press up without clanking the bells. Keep the shoulder blades retracted.",
  db_incl:"Incline ~30°. Lower the bells with control for a deep chest stretch, press up over the upper chest.",
  db_floor:"Lie on the floor and press; let the triceps lightly touch the floor each rep. The floor limits the range and spares the shoulders.",
  lm_press:"Tuck the bar end into your shoulder, stand staggered and braced. Press up and slightly forward, one arm at a time. Don't lean back to heave it up.",
  dips:"Grip the bars and lean the torso forward for chest emphasis. Lower until the shoulders are level with the elbows, press back up. Don't shrug at the top.",
  pushup:"Hands under the shoulders, body in a straight line, abs braced. Lower the chest to just off the floor and push up. Add the vest for load.",
  cable_fly:"Pulleys low or mid, a slight fixed bend in the elbows. Sweep the handles together in a hugging arc, squeeze, control back out.",
  bb_ohp:"Bar on the front delts, grip just outside the shoulders. Squeeze glutes and abs, press overhead, move the head back slightly so the bar clears the chin then back under at lockout.",
  db_ohp:"Seated with back support. Press from shoulder height to overhead without banging the bells together. Keep the ribs down — don't arch the lower back.",
  db_ohp_st:"Standing and strict — no leg drive. Brace hard and press overhead. Builds shoulder stability.",
  lat_raise:"Slight forward lean, soft elbows. Lead with the elbows up to shoulder height, like pouring water. Don't swing or shrug.",
  cable_lat:"Low pulley across the body; raise the arm out to the side against constant tension. One side at a time.",
  face_pull:"Rope on the high pulley. Pull toward the forehead, thumbs rotating back, elbows high. Squeeze the rear delts — great for posture.",
  rear_fly:"Chest on an incline bench, light bells. Sweep the arms out to the sides leading with the pinkies. No momentum.",
  pushdown:"Rope on the high pulley, elbows pinned to your sides. Extend down and spread the rope at the bottom, control back up.",
  oh_ext:"One bell overhead in both hands. Lower behind the head for a deep triceps stretch, extend back up. Keep the elbows pointing forward.",
  skull:"Lying on the bench, EZ bar above the forehead. Bend only at the elbows to lower toward the forehead, then extend. Keep the elbows still — don't drift them back.",
  cgbp:"Bench press with a shoulder-width grip and elbows tucked tight to the body. Triceps-focused.",
  pullup:"Dead hang, overhand grip. Pull until the chin clears the bar by driving the elbows down, lower under control. Add the vest when it gets easy.",
  pullup_neutral:"Grip the close neutral handles with your palms facing each other and pull until your chin clears. This is the most shoulder-friendly pull-up variation and lets the biceps contribute, so most people are strongest here.",
  pullup_neutral_wide:"Same neutral palms-facing grip but on the wide handles. The wider hand position shifts work outward across the upper back and lats, and it is a little harder than the close version.",
  pullup_wide:"Hands wide on the straight bar, palms forward. Think about driving the elbows down and in toward your ribs rather than pulling with the arms. Lats do more work, biceps do less.",
  pullup_angled:"Use the 30-degree drop grips. The angle sits between a pronated and a neutral grip, which many lifters find is the sweet spot for wrist and elbow comfort under load.",
  pullup_inner:"The 80-degree inner tubes put your hands narrow and nearly vertical. Expect a strong biceps and lower-lat emphasis, and a deeper range at the top.",
  pullup_globe_sm:"Hang from the small 3.1 inch globes. The thick round grip makes your hands and forearms the limiting factor long before your back tires. Keep reps low and honest; grip strength is the training goal.",
  pullup_globe_lg:"The 4 inch globes. Even harder to hold than the small ones. Expect a fraction of your normal pull-up reps, and treat every set as grip work that happens to include a pull-up.",
  pullup_band:"Loop a band over the bar and put your knees or feet in it. The band helps most at the bottom where you are weakest. Step down to a lighter band as you get stronger; the goal is to eventually need none.",
  pullup_negative:"Jump, step, or use a box to reach the top position, then lower yourself as slowly as you can, aiming for five seconds. You are far stronger lowering than lifting, which is exactly why this builds your first strict pull-up.",
  pullup_lsit:"Hold your legs straight out in front of you, parallel to the floor, and keep them there for the entire pull-up. The core holds an isometric while the back does the pulling. Reduce to a tucked knee hold if the legs drop.",
  pullup_archer:"Pull yourself up and across toward one hand while the opposite arm stays straight out along the bar. Alternate sides. It loads one arm heavily and is a genuine step on the road to a one-arm pull-up.",
  pullup_typewriter:"Pull to the top, then travel side to side along the bar while keeping your chin above it. Stay high the whole time. Advanced move; earn it with clean archer pull-ups first.",
  scap_pullup:"Hang with straight arms. Without bending your elbows at all, pull your shoulder blades down and back so your body rises an inch or two, then let it settle. Builds the scapular control that protects the shoulders in every pull.",
  dead_hang:"Hang from the bar with a full grip and relaxed shoulders, breathing normally. Builds grip endurance and decompresses the spine and shoulders. Log the time rather than reps.",
  chinup:"Underhand grip. Pull the chin over the bar driving the elbows down — hits the biceps harder than a pull-up.",
  pulldown:"Tall chest, slight lean back. Pull the bar to the upper chest leading with the elbows, control it back up. Don't yank with the lower back.",
  bb_row:"Hinge to ~45°, neutral spine, bar hanging. Row to the lower ribs/belt, squeeze, lower with control. Keep the torso angle fixed.",
  pendlay:"Like a bent row but the bar resets on the floor each rep from a flatter back. Explosive pull, dead stop between reps.",
  db_row:"One hand and knee on the bench, flat back. Row the bell to the hip driving the elbow back, squeeze. Don't rotate the torso.",
  low_row:"Seated, tall chest, a slight reach forward on the stretch. Pull the handle to the stomach, squeeze the shoulder blades, control back.",
  lm_row:"Stand over the landmine bar, hinge, and row the end to your torso for a big stretch and contraction.",
  cs_row:"Chest supported on an incline bench so you can't cheat. Row both bells to the hips, squeeze, lower slowly.",
  trap_row:"Hinge over the trap bar and row it to the belt line; the neutral handles are easy on the shoulders.",
  ez_curl:"Elbows fixed at your sides, curl the EZ bar up, squeeze, lower slowly. No swinging or leaning back.",
  db_curl:"Curl with control and supinate (turn the pinky up) at the top for a hard squeeze.",
  hammer:"Neutral grip, palms facing in, curl up. Targets the brachialis and forearms.",
  cable_curl:"Low pulley, constant tension throughout for a strong squeeze at the top.",
  bb_squat:"Bar on the upper back, abs braced. Break at the hips and knees together, sit to at least parallel keeping the chest up, drive up through mid-foot. Don't let the knees cave in.",
  front_squat:"Bar on the front delts, elbows high. Stay upright as you squat — more quad and core. Drive the elbows up out of the bottom.",
  trap_squat:"Stand inside the trap bar, hinge and squat to the handles, stand tall. Knees track over the toes.",
  goblet:"Hold a bell at the chest, elbows inside the knees. Sit between the hips keeping the torso tall, drive up.",
  bss:"Rear foot on the bench, front foot forward. Drop straight down sending the back knee toward the floor, drive up through the front heel. Per leg.",
  walk_lunge:"Step forward into a lunge, back knee toward the floor, push off and bring the rear leg through to the next step. Long strides for glutes.",
  step_up:"Plant the whole foot on the bench, drive through that heel to stand tall, control the way down. Minimal push off the floor.",
  lm_squat:"Hold the landmine bar end at the chest, heels can sit on the wedge. Squat down and drive up — easy on the back.",
  heel_squat:"Heels on the wedge, hold a bell. The elevation lets you stay upright and bias the quads.",
  deadlift:"Bar over mid-foot, hinge and grip just outside the knees, flat back, chest up. Take the slack out, then push the floor away and stand tall, bar dragging up the legs. Don't round the lower back or jerk it off the floor.",
  trap_dl:"Stand in the trap bar, grip the handles, flat back. Drive through the floor; hips and shoulders rise together. The most beginner-friendly deadlift.",
  bb_rdl:"Start standing with the bar. Soft knees, push the hips back and slide the bar down the thighs until you feel a hamstring stretch, then drive the hips forward. It's a hinge, not a squat — keep the back flat.",
  db_rdl:"The same hinge as the RDL but with dumbbells kept close to the legs.",
  lm_rdl:"Hinge while the landmine bar arcs down in front of you, then drive the hips to stand.",
  ghr:"Anchor the feet, body straight from knee to head. Lower slowly using the hamstrings, then pull back up. Very hard — shorten the range to scale.",
  nordic:"Pin your ankles under the bench leg roller and kneel tall with the body in a straight line. Resist falling forward as slowly as you can, then push off lightly to reset. Loop a band around your chest and anchor it in front to take load off while you build strength. Brutal hamstring eccentric.",
  ghr_curl:"Lie on your back with your heels on the roller's foot tray. Drive the hips up into a bridge and hold that height, then curl the heels toward your butt. The hips must not sag as the roller comes in — that sag is where the hamstring work gets stolen by the glutes.",
  ghr_curl_sl:"Same as the supine leg curl but with one foot on the tray and the other leg held off the floor. Keep the hips level and square as you curl. Expect a big drop in reps versus two legs.",
  ghr_curl_cable:"Attach the included strap and handle to the roller and clip it to the low pulley. Set up for a supine leg curl; now the stack pulls the roller away from you the whole time. This is the version you can progressively overload week to week.",
  ghr_curl_band:"Anchor a band behind the roller and set up for a supine curl. Resistance builds as the roller travels in, loading the shortened position hardest. Use when the cable stack is tied up.",
  ghr_bridge_curl:"Bridge the hips up first and hold a hard glute squeeze. From there, curl the heels in and press them back out without ever letting the hips drop. Combines a glute bridge isometric with the hamstring curl.",
  ghr_slideout:"Start hips-high with the heels on the tray. Let the legs slowly extend out under control, fighting it the whole way, then reset with your hands or a bent-knee return. Purely eccentric — take four or five seconds on the way out.",
  ghr_lat_lunge:"Stand with one foot on the roller. Slide it out to the side while sitting back and down into the standing leg, then pull it back in. The standing leg does the work; the roller leg just travels.",
  ghr_rev_lunge:"One foot on the roller, slide it straight back into a lunge, drop the back knee toward the floor, then pull the foot home. Constant tension, zero impact — kind on the knees.",
  ghr_curtsy:"Slide the roller foot back and diagonally across behind your standing leg, sit into the hip, then return. Targets the glute medius and the hip stability most lunges miss.",
  ghr_rollout:"Kneel with your hands on the roller, ribs down and glutes squeezed. Roll it out in front of you only as far as you can go without your lower back arching or hips sagging, then pull it back. Range is earned, not forced.",
  ghr_rollout_stand:"The kneeling rollout performed from your feet. Enormous demand on the abs and lats to keep the spine from extending. Only attempt after you own full-range kneeling rollouts.",
  ghr_rollout_cable:"Clip the roller's strap to the low pulley so the stack resists the roll-out. It loads the deepest, hardest part of the movement and lets you add weight instead of just chasing range.",
  ghr_bodysaw:"Get into a forearm plank with your feet on the tray. Push back through the shoulders so the whole body slides away, then pull back to the start. The hips stay level for every inch of travel.",
  ghr_tuck:"From a push-up plank with feet on the tray, pull the knees in toward the chest, then extend back out slowly. The slow extension is the part that builds the abs.",
  ghr_pike:"Plank with feet on the tray. Keeping the legs straight, drive the hips up toward the ceiling into an inverted V, then lower back to a flat plank under control.",
  ghr_oblique_tuck:"Plank with feet on the tray. Tuck the knees diagonally toward one elbow, extend back, then tuck to the other side. Hits the obliques through rotation under load.",
  ghr_knee_raise_band:"Loop a band around the roller and your feet. From a supported plank or V-sit, raise the knees against the band's pull and lower slowly. Adds resistance to an otherwise bodyweight-only move.",
  ghr_climber:"Plank with feet on the tray. Drive one knee in at a time as fast as you can while keeping the hips flat and the shoulders stacked over the hands. Core work with a conditioning bite.",
  kb_swing:"Hinge and hike the bell back between the legs, then snap the hips forward to float it to chest height. It's a hip drive, not an arm raise.",

  if(merged.length){ STATE.workouts=merged; lsSet("gym_workouts",merged); if(hasStore){ try{ await window.storage.set("gym_workouts",JSON.stringify(merged)); }catch(e){} } }

function loadsFor(cap){ const e=STATE.equipment.find(x=>x.on&&(x.caps||[]).includes(cap)&&x.loads); return e?e.loads:null; }
function snap(val,cap){ const loads=loadsFor(cap); if(!loads||val==null) return val; return loads.reduce((a,b)=>Math.abs(b-val)<Math.abs(a-val)?b:a); }

const _roleRank={compound:0,accessory:1,isolation:2,core:3};
function groupStationRank(g){ let req=new Set(); let core=false; g.items.forEach(id=>{ const e=exById(id); if(!e) return; (e.requires||[]).forEach(x=>req.add(x)); if((e.primary||[]).includes("core")) core=true; });
  if(core) return 6; // core finisher last
  if(req.has("barbell")||req.has("trapbar")||req.has("rack")) return 0; // rack/barbell cluster first
  if(req.has("landmine")) return 1;
  if(req.has("ezbar")) return 2;
  if(req.has("cable_high")||req.has("cable_low")||req.has("ankle_cuffs")) return 5; // cable stack together, later
  return 3; // dumbbell / band / bodyweight
}
function orderGroupsEfficient(groups){
  return groups.map((g,i)=>{ const rank=groupStationRank(g); const roleMin=Math.min(...g.items.map(id=>{ const e=exById(id); return e?(_roleRank[e.role]??2):2; })); return {g,rank,roleMin,i}; })
    .sort((a,b)=> a.rank-b.rank || a.roleMin-b.roleMin || a.i-b.i)
    .map(x=>x.g);
}
function normalizeGroupSets(w){
  (w.groups||[]).forEach(g=>{ if(g.items.length<2) return;
    const exs=g.items.map(id=>w.exercises.find(e=>e.id===id)).filter(Boolean);
    const target=Math.max(...exs.map(e=>e.sets.filter(s=>!s.drop).length));
    exs.forEach(e=>{ const drop=e.sets.filter(s=>s.drop); let work=e.sets.filter(s=>!s.drop);
      while(work.length<target){ const last=work[work.length-1]||{w:"",reps:""}; work.push({w:last.w,reps:last.reps||"",done:false,band:last.band||null}); }
      while(work.length>target) work.pop();
      e.sets=work.concat(drop);
    });
  });
}
function buildLoggable(e){
  const sc=schemeFor(e.role); const prev=lastSession(e.id);
  const ov=(STATE.settings.restOverrides||{})[e.id];
  const restSec=ov!=null?ov:sc.restSec;
  const dropPct=e._dropPct||null;
  const metric=e.metric||"reps";
  const repLabel=metric==="time"?"30–45s":metric==="carry"?"~40 steps":sc.reps;
  let sets=[];
  const psets=(prev&&prev.sets&&prev.sets.length)?prev.sets.filter(s=>!s.drop):null;
  for(let i=0;i<sc.sets;i++){ const src=psets?(psets[i]||psets[psets.length-1]):null; sets.push({w:src?src.w:"",reps:src?src.reps:"",done:false,band:src?(src.band||null):null}); }
  if(dropPct){ const base=Math.max(0,...sets.map(s=>parseFloat(s.w)||0)); sets.push({w:base>0?round5(base*(1-dropPct)):"",reps:"",done:false,drop:true}); }
  const req=e.requires||[]; const bandKind=req.includes("resistancebands")?"power":req.includes("hipbands")?"hip":null;
  const prevBand=(prev&&prev.band)?prev.band:null;
  if(bandKind) sets.forEach(s=>{ if(s.band==null) s.band=prevBand||null; });
  return {id:e.id,name:e.name,role:e.role,muscles:[...e.primary,...(e.secondary||[])],scheme:sc.sets+" × "+repLabel,metric,
    rest:fmt(restSec),restSec,cue:e.cue,tech:e._tech||null,dropPct,unilateral:!!e.unilateral,barbell:isBarbellEx(e),landmine:(e.requires||[]).includes("landmine"),bandKind,band:prevBand,rpe:prev?(prev.rpe||null):null,sets,
    _prev:prev?prev.sets.filter(s=>!s.drop).map(s=>({w:s.w,reps:s.reps})):null};
}
function exStations(e){ const s=[...(e.stations||[])]; const r=e.requires||[]; if(r.includes("rack")&&r.includes("bench")) s.push("benchrack"); return s; }
const XCONFLICT={benchrack:["cable_high","cable_low","hangbar"],cable_high:["benchrack"],cable_low:["benchrack"],hangbar:["benchrack"]};
function stationConflict(stations,e){ const es=exStations(e); if(es.some(s=>stations.includes(s))) return true; return es.some(s=>(XCONFLICT[s]||[]).some(x=>stations.includes(x))); }
function implOf(e){ const r=e.requires||[]; if(r.includes("dumbbells")) return "db"; if(r.includes("kettlebell")) return "kb"; return null; }
const IMPL_CAP={db:1,kb:2}; // one adjustable DB pair · two adjustable KBs
function capOK(group,cand){ const im=implOf(cand); if(!im) return true; const cur=group.filter(e=>implOf(e)===im).length; return cur<(IMPL_CAP[im]||99); }
function groupExercises(list,mode){
  const size=mode==="circuit"?3:2; const groups=[]; let remaining=[...list];
  if(mode==="strength"){ const comp=remaining.filter(e=>e.role==="compound"); comp.forEach(e=>{ remaining=remaining.filter(x=>x!==e); groups.push({type:"straight",items:[e.id]}); }); }
  while(remaining.length){
    const head=remaining.shift(); const g=[head]; let stn=exStations(head);
    if(!head._dropPct){ for(let i=0;i<remaining.length&&g.length<size;){ if(!remaining[i]._dropPct&&!stationConflict(stn,remaining[i])&&capOK(g,remaining[i])){ stn=stn.concat(exStations(remaining[i])); g.push(remaining.splice(i,1)[0]); } else i++; } }
    groups.push({type:g.length>1?(mode==="circuit"?"circuit":"superset"):"straight",items:g.map(e=>e.id)});
  }
  return groups;
}
function swapCandidates(exData,w){
  const owned=ownedCaps(); const base=exById(exData.id); if(!base) return [];
  const group=w.groups.find(g=>g.items.includes(exData.id)); const groupStations=[]; const others=[];
  if(group) group.items.filter(id=>id!==exData.id).forEach(id=>{ const o=exById(id); if(!o) return; others.push(o); exStations(o).forEach(s=>groupStations.push(s)); });
  const inWO=new Set(w.exercises.map(e=>e.id)); const blocked=new Set(STATE.settings.blocked||[]);
  const cands=EXERCISES.filter(e=>e.type==="strength"&&exAvailable(e,owned)&&e.id!==exData.id&&!inWO.has(e.id)&&!blocked.has(e.id)&&!stationConflict(groupStations,e)&&capOK(others,e));
  const bm=new Set([...base.primary,...base.secondary]);
  function score(e){ let s=0; if(e.pattern===base.pattern)s+=3; if(e.role===base.role)s+=1; e.primary.forEach(m=>{if(bm.has(m))s+=2;}); e.secondary.forEach(m=>{if(bm.has(m))s+=1;}); return s; }
  function why(e){ const sh=e.primary.filter(m=>bm.has(m)).map(m=>MUSCLE_LABEL[m]); return (e.pattern===base.pattern?"same movement":sh.length?sh.join("/"):e.role); }
  return cands.map(e=>({e,s:score(e)})).sort((a,b)=>b.s-a.s).slice(0,6).map(o=>({ex:o.e,why:why(o.e)}));
}

function playAlarm(kind,vol){ try{ vol=vol!=null?vol:Math.max(0.15,Math.min(1,(STATE.settings.alarmVol!=null?STATE.settings.alarmVol:0.9))); const K=kind||STATE.settings.alarmSound||"arcade";
  if(K==="sample"){ playSample(vol); return; }
  if(!AC) return; const now=AC.currentTime;
  // punchy, warm chiptune note: detuned dual-osc through a lowpass, with attack/decay envelope
  const note=(f,start,dur,opt)=>{ opt=opt||{}; const t=now+start; const o=AC.createOscillator(),o2=AC.createOscillator(),g=AC.createGain(),lp=AC.createBiquadFilter();
    lp.type="lowpass"; lp.frequency.value=opt.filter||2600; lp.Q.value=opt.q||1;
    o.type=opt.type||"square"; o2.type=opt.type||"square"; o.frequency.setValueAtTime(f,t); o2.frequency.setValueAtTime(f,t); o2.detune.value=opt.detune!=null?opt.detune:9;
    if(opt.glide){ o.frequency.exponentialRampToValueAtTime(opt.glide,t+dur*0.92); o2.frequency.exponentialRampToValueAtTime(opt.glide,t+dur*0.92); }
    o.connect(g); o2.connect(g); g.connect(lp); lp.connect(AC.destination);
    const pk=vol*(opt.gain!=null?opt.gain:1);
    g.gain.setValueAtTime(0.0001,t); g.gain.exponentialRampToValueAtTime(pk,t+0.006); g.gain.setValueAtTime(pk,t+dur*0.45); g.gain.exponentialRampToValueAtTime(0.0001,t+dur);
    o.start(t);o2.start(t);o.stop(t+dur+0.03);o2.stop(t+dur+0.03); };
  if(K==="powerup"){ [523,659,784,1046,1318].forEach((f,i)=>note(f,i*0.07,0.09,{filter:3200})); note(1568,0.35,0.4,{glide:2093,filter:3600}); }
  else if(K==="warble"){ for(let i=0;i<6;i++){ note(1046,i*0.16,0.1,{filter:3000}); note(784,i*0.16+0.08,0.1,{filter:3000}); } }
  else if(K==="pulse"){ for(let i=0;i<8;i++){ note(i%2?740:988,i*0.11,0.09,{type:"sawtooth",filter:2200,detune:14,gain:0.95}); } }
  else { // arcade alert (default): two rising blips + a held glide tone, repeated once
    const seq=(o)=>{ note(660,o+0,0.08,{filter:2800}); note(880,o+0.1,0.08,{filter:3000}); note(1245,o+0.22,0.26,{glide:1660,filter:3400}); };

/* ---- optional live heart rate over Web Bluetooth ----
   Works when the app runs on its own https page and the watch is broadcasting HR.
   The in-app Claude sandbox blocks Bluetooth, so this degrades gracefully. */
let HR={device:null,char:null,bpm:null,readings:[],connected:false};
async function connectHR(){
  if(HR.connected&&HR.device&&HR.device.gatt){ try{ HR.device.gatt.disconnect(); }catch(e){} return; }
  try{
    if(!(navigator.bluetooth&&navigator.bluetooth.requestDevice)){ toast("Bluetooth isn’t available inside the Claude app — needs the app on its own page"); return; }
    const dev=await navigator.bluetooth.requestDevice({filters:[{services:["heart_rate"]}]});
    const server=await dev.gatt.connect();
    const svc=await server.getPrimaryService("heart_rate");
    const ch=await svc.getCharacteristic("heart_rate_measurement");
    await ch.startNotifications();
    ch.addEventListener("characteristicvaluechanged",e=>{ const v=e.target.value; const f=v.getUint8(0); const bpm=(f&1)?v.getUint16(1,true):v.getUint8(1); if(bpm>0){ HR.bpm=bpm; HR.readings.push(bpm);
      if(STATE.current){ const hs=STATE.current.hrStats||(STATE.current.hrStats={n:0,sum:0,max:0}); hs.n++; hs.sum+=bpm; if(bpm>hs.max) hs.max=bpm; const now=Date.now(); if(!HR._lastP||now-HR._lastP>30000){ HR._lastP=now; pCur(); } } } updateHRChip(); });
    dev.addEventListener("gattserverdisconnected",()=>{ HR.connected=false; HR.bpm=null; HR.wasConnected=true; updateHRChip(); toast("HR strap disconnected — tap Reconnect HR"); });
    HR.device=dev; HR.char=ch; HR.connected=true; updateHRChip(); toast("HR monitor connected");
  }catch(err){ if(err&&(err.name==="NotFoundError"||err.name==="AbortError")) return; toast("Couldn’t connect — check the watch is broadcasting heart rate"); }
}
function updateHRChip(){ const el=document.getElementById("hrChip"); if(!el) return;
  el.classList.toggle("on2",!!HR.connected);
  el.innerHTML=`<svg viewBox="0 0 24 24"><path d="M12 20s-7-4.35-7-9a4 4 0 017-2.65A4 4 0 0119 11c0 4.65-7 9-7 9z"/></svg>`+(HR.connected?(HR.bpm?`<b class="mono" style="color:var(--ink)">${HR.bpm}</b>&nbsp;bpm`:"reading…"):(HR.wasConnected?`<b style="color:var(--amber)">Reconnect HR</b>`:"Connect HR"));
}

function bucketOf(date,period){
  const d=new Date(date);
  if(period==="year") return {k:""+d.getFullYear(),label:""+d.getFullYear(),sort:d.getFullYear()};
  if(period==="week"){ const t=new Date(d); const day=(t.getDay()+6)%7; t.setHours(0,0,0,0); t.setDate(t.getDate()-day); return {k:"w"+t.getTime(),label:(t.getMonth()+1)+"/"+t.getDate(),sort:t.getTime()}; }
  return {k:d.getFullYear()+"-"+(d.getMonth()+1),label:d.toLocaleString(undefined,{month:"short"})+" "+(""+d.getFullYear()).slice(2),sort:d.getFullYear()*12+d.getMonth()};
}
function progData(exId,period){

    const done=e.sets.filter(s=>s.done&&(parseFloat(s.w)||0)>0); if(!done.length) return;
    const top=Math.max(...done.map(s=>parseFloat(s.w)||0));
    const e1=Math.max(...done.map(s=>{ const wt=parseFloat(s.w)||0,rp=parseFloat(s.reps)||0; return rp>0?Math.round(wt*(1+rp/30)):wt; }));
    const b=bucketOf(w.date,period); const cur=buckets.get(b.k)||{label:b.label,sort:b.sort,top:0,e1:0};
    cur.top=Math.max(cur.top,top); cur.e1=Math.max(cur.e1,e1); buckets.set(b.k,cur);

  return [...buckets.values()].sort((a,b)=>a.sort-b.sort);
}

function importData(json){
  let d; try{ d=JSON.parse(json); }catch(e){ return false; }
  if(!d||typeof d!=="object") return false;
  if(Array.isArray(d.workouts)) STATE.workouts=mergeWorkouts(STATE.workouts,d.workouts);
  if(d.settings){
    STATE.settings.pinned=[...new Set([...(STATE.settings.pinned||[]),...(d.settings.pinned||[])])];
    STATE.settings.blocked=[...new Set([...(STATE.settings.blocked||[]),...(d.settings.blocked||[])])];
    ["daysPerWeek","duration","mode","experience","goal","alarmVol","alarmSound"].forEach(k=>{ if(d.settings[k]!=null) STATE.settings[k]=d.settings[k]; });
    if(d.settings.recWeights) STATE.settings.recWeights=Object.assign(STATE.settings.recWeights||{},d.settings.recWeights);
  }
  if(Array.isArray(d.equipment)){
    const byId={}; d.equipment.forEach(e=>byId[e.id]=e);

    d.equipment.filter(e=>e.custom&&!STATE.equipment.find(x=>x.id===e.id)).forEach(e=>STATE.equipment.push(e));
  }
  pWo(); pSet(); pEq(); return true;
}

view.addEventListener("input",e=>{
  const inp=e.target;

    if(k==="w"&&ex.dropPct){ const di=ex.sets.findIndex(s=>s.drop); if(di>=0){ if(si===di){ ex._dropManual=true; } else if(!ex._dropManual){ const base=Math.max(0,...ex.sets.filter((s,i)=>i!==di).map(s=>parseFloat(s.w)||0)); const dw=base>0?round5(base*(1-ex.dropPct)):""; ex.sets[di].w=dw; const di2=row.parentElement.querySelector('.setrow[data-set="'+di+'"] input[data-k="w"]'); if(di2&&document.activeElement!==di2) di2.value=dw; } } }
    pCur(); return; }
  if(inp.dataset.addexq!=null&&STATE.current){ UI.addExQuery=inp.value; renderToday(); const s=document.getElementById("addExSearch"); if(s){ s.focus(); const v=s.value; s.value=""; s.value=v; } return; }

  if(inp.dataset.cbp!=null){ if(!UI.cardioB.p) UI.cardioB.p={}; UI.cardioB.p[inp.dataset.cbp]=inp.value; return; }
  if(inp.dataset.set==="autoBackup"){ STATE.settings.autoBackup=inp.value; pSet(); renderSettings(); return; }
  if(inp.dataset.set==="sledLane"){ STATE.settings.sledLane=Math.max(5,Math.min(2000,+inp.value||60)); pSet(); return; }
  if((inp.dataset.ck||inp.dataset.cf)&&STATE.current){ const row=inp.closest(".setrow"); const c=STATE.current.conditioning[+row.dataset.ci]; if(!c.sets) c.sets=[mkCondSet(c.fields)]; const s=c.sets[+row.dataset.cset]; if(inp.dataset.ck==="w"){ s.w=inp.value; } else { if(!s.vals) s.vals={}; s.vals[inp.dataset.cf]=inp.value; } pCur(); return; }

  if(inp.dataset.pc==="w"){ const panel=inp.closest(".pcalc"); const id=panel.dataset.ex; UI.plateW[id]=inp.value; const single=panel.dataset.single==="1"; const bar=single?0:barWeightFor({id,requires:exById(id).requires}); panel.querySelector(".pc-body").innerHTML=plateVisual(inp.value,bar,single); return; }
});
